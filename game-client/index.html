<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>炸金花 - 同舟智联</title>
  <style>
    /* ============ 全局样式 ============ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --primary: #1B5E20;
      --primary-light: #2E7D32;
      --accent: #FFD700;
      --accent-light: #FFE082;
      --bg: #0D1B0F;
      --bg-table: #1A3D1C;
      --text: #FFFFFF;
      --text-gold: #FFE082;
      --danger: #F44336;
      --success: #4CAF50;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    /* ============ 加载页 ============ */
    #loading-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .loading-title {
      font-size: 32px;
      font-weight: bold;
      color: var(--accent);
      margin-bottom: 30px;
      text-shadow: 0 2px 10px rgba(255, 215, 0, 0.3);
    }

    .loading-bar {
      width: 200px;
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
    }

    .loading-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary-light), var(--accent));
      width: 0%;
      transition: width 0.3s;
    }

    .loading-tip {
      margin-top: 15px;
      font-size: 14px;
      color: rgba(255,255,255,0.5);
    }

    /* ============ 主菜单 ============ */
    #menu-screen {
      display: none;
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, var(--bg) 0%, #0a2a0f 100%);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .menu-logo {
      font-size: 42px;
      font-weight: bold;
      color: var(--accent);
      text-shadow: 0 0 20px rgba(255,215,0,0.5);
      margin-bottom: 10px;
    }

    .menu-subtitle {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 60px;
    }

    .menu-btn {
      width: 280px;
      padding: 16px;
      margin: 10px 0;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .menu-btn:active {
      transform: scale(0.96);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      color: white;
      box-shadow: 0 4px 15px rgba(46, 125, 50, 0.4);
    }

    .btn-accent {
      background: linear-gradient(135deg, #FF8F00, #FF6F00);
      color: white;
      box-shadow: 0 4px 15px rgba(255, 111, 0, 0.4);
    }

    .btn-outline {
      background: transparent;
      border: 2px solid rgba(255,255,255,0.3);
      color: white;
    }

    .menu-footer {
      position: absolute;
      bottom: 30px;
      font-size: 12px;
      color: rgba(255,255,255,0.3);
    }

    /* ============ 难度选择 ============ */
    #difficulty-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal-content {
      background: var(--bg-table);
      border-radius: 20px;
      padding: 30px;
      width: 300px;
      text-align: center;
    }

    .modal-title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 20px;
      color: var(--accent);
    }

    .diff-btn {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      background: rgba(255,255,255,0.1);
      color: white;
      transition: background 0.2s;
    }

    .diff-btn:active {
      background: rgba(255,255,255,0.2);
    }

    .diff-btn.easy { border-left: 3px solid #4CAF50; }
    .diff-btn.normal { border-left: 3px solid #FF9800; }
    .diff-btn.hard { border-left: 3px solid #F44336; }

    /* ============ 游戏桌 ============ */
    #game-screen {
      display: none;
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, var(--bg-table) 0%, var(--bg) 100%);

    }

    /* 顶部栏 */
    .game-header {

      justify-content: space-between;
      align-items: center;
      padding: 12px 15px;
      background: rgba(0,0,0,0.3);
    }

    .game-info {

      gap: 15px;
      font-size: 14px;
    }

    .info-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .info-icon {

    }

    .btn-back {

      border: none;
      color: white;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;

      justify-content: center;

    .pot-label {

    .round-info {

      color: rgba(255,255,255,0.5);

    .player-area {

    .player-area.bottom-left { bottom: 180px; left: 20px; }
    .player-area.bottom-right { bottom: 180px; right: 20px; }
    .player-area.bottom { bottom: 20px; left: 50%; transform: translateX(-50%); }

    .player-avatar {

      height: 50px;

      align-items: center;
      justify-content: center;
      font-size: 20px;
      border: 3px solid rgba(255,255,255,0.2);
      position: relative;
    }

    .player-avatar.dealer::after {
      content: '庄';
      position: absolute;
      top: -8px;
      right: -8px;
      width: 20px;
      height: 20px;

      border-radius: 50%;

      display: flex;
      align-items: center;
      justify-content: center;

    .player-avatar.online::before {

      bottom: 0;
      right: 0;
      width: 12px;
      height: 12px;
      background: var(--success);
      border-radius: 50%;

    .player-name {

      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .player-chips {

      color: var(--accent);

    /* 手牌 */

      gap: 5px;

    .card {

      height: 65px;
      background: white;
      border-radius: 6px;

      align-items: center;
      justify-content: center;

    .card.black { color: #212121; }

    /* 操作区 */

      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);

      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;

    .action-btn:active {

    }

    .action-btn:disabled {

    }

    .btn-fold {

      color: white;
    }
    .btn-call {
      background: #1565C0;
      color: white;
    }
    .btn-raise {
      background: #F57C00;
      color: white;
    }
    .btn-look {
      background: #388E3C;
      color: white;
    }

    .raise-control {

      align-items: center;
      gap: 10px;
      justify-content: center;
    }

    .raise-slider {
      flex: 1;
      max-width: 200px;
      -webkit-appearance: none;
      height: 6px;
      border-radius: 3px;
      background: rgba(255,255,255,0.2);

    .raise-slider::-webkit-slider-thumb {
      -webkit-appearance: none;

      height: 20px;
      border-radius: 50%;

    .raise-amount {
      min-width: 60px;

    }

      background: rgba(255,255,255,0.1);
      width: 100%;
    }

    .timer-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--success), var(--accent));
      width: 100%;
      transition: width 0.5s linear;
    }

    /* ============ 结果弹窗 ============ */
    #result-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      align-items: center;
      justify-content: center;
      z-index: 200;
    }

    .result-content {
      background: linear-gradient(180deg, var(--bg-table), var(--bg));
      border-radius: 20px;
      padding: 30px;
      width: 320px;
      text-align: center;
      border: 2px solid var(--accent);
    }

    .result-title {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .result-title.win { color: var(--accent); }
    .result-title.lose { color: #F44336; }

    .result-hand {
      font-size: 18px;
      color: white;
      margin-bottom: 20px;
    }

    .result-chips {
      font-size: 36px;
      font-weight: bold;
      margin-bottom: 25px;
    }

    .result-chips.win { color: var(--success); }
    .result-chips.lose { color: var(--danger); }

    .result-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      color: white;
      margin: 5px 0;
    }

    /* ============ 动画 ============ */
    @keyframes cardDeal {
      from {
        transform: translateY(-200px) rotate(180deg) scale(0.5);
        opacity: 0;
      }
      to {
        transform: translateY(0) rotate(0) scale(1);
        opacity: 1;
      }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    .card-dealing {
      animation: cardDeal 0.4s ease-out;
    }

    .pulse {
      animation: pulse 1s infinite;
    }

    .fade-in {
      animation: fadeIn 0.3s ease-out;
    }
  </style>
</head>

<script>
const GS = {MENU:'menu',LOADING:'loading',PLAYING:'playing',RESULT:'result'};
const HR = {SINGLE:1,PAIR:2,STRAIGHT:3,FLUSH:4,BOMB:5};
const HN = {1:'单张',2:'对子',3:'顺子',4:'金花',5:'炸弹'};
const ANTE = 50;
const TURN_TIME = 20;

let state = GS.MENU;
let players = [];
let myCards = [];
let pot = 0, curBet = 0, blindBet = 0;
let turnIdx = 0;
let roundNum = 0;
let humanActedThisRound = false;
let seen = {};
let busy = false;
let aiRunning = false;
let turnTimer = null;
let turnEndTime = 0;

function val(c){const m={'A':14,'K':13,'Q':12,'J':11,'10':10,'9':9};return m[c.slice(1)]||+c.slice(1);}
function suit(c){return c[0];}
function red(c){return suit(c)==='♥'||suit(c)==='♦';}
function handType(cards){
  if(!cards||cards.length!==3)return HR.SINGLE;
  const v=cards.map(val).sort((a,b)=>a-b),s=cards.map(suit);
  const flush=s.every(x=>x===s[0]);
  const straight=v[2]-v[1]===1&&v[1]-v[0]===1;
  const bomb=v[0]===v[1]&&v[1]===v[2];
  const pair=v[0]===v[1]||v[1]===v[2];
  if(bomb)return HR.BOMB;
  if(flush&&straight)return HR.STRAIGHT;
  if(flush)return HR.FLUSH;
  if(straight)return HR.STRAIGHT;
  if(pair)return HR.PAIR;
  return HR.SINGLE;
}
function cmp(a,b){
  const ta=handType(a),tb=handType(b);
  if(ta!==tb)return ta>tb?1:-1;
  const va=a.map(val).sort((x,y)=>x-y),vb=b.map(val).sort((x,y)=>y-x);
  if(ta===HR.PAIR){const pa=va[1],pb=vb[1];if(pa!==pb)return pa>pb?1:-1;const sa=va[0]===va[1]?va[2]:va[0],sb=vb[0]===vb[1]?vb[2]:vb[0];return sa>sb?1:(sa<sb?-1:0);}
  for(let i=2;i>=0;i--)if(va[i]!==vb[i])return va[i]>vb[i]?1:-1;
  return 0;
}

document.addEventListener('DOMContentLoaded',()=>simLoad());

function simLoad(){
  const fill=document.getElementById('loading-fill'),tip=document.getElementById('loading-tip');
  const tips=['正在加载扑克牌资源...','正在初始化游戏引擎...','正在连接服务器...','准备就绪!'];
  let p=0;
  const iv=setInterval(()=>{
    p+=Math.random()*25;
    if(p>=100){p=100;clearInterval(iv);setTimeout(()=>{
      document.getElementById('loading-screen').style.display='none';
      document.getElementById('menu-screen').style.display='flex';
      state=GS.MENU;},500);}
    fill.style.width=p+'%';tip.textContent=tips[Math.floor(p/25)]||tips[3];
  },300);
}

function startGame(m){if(busy||state===GS.PLAYING)return;if(m==='ai')document.getElementById('difficulty-modal').style.display='flex';else alert('在线模式即将上线！');}
function confirmDifficulty(){if(busy)return;busy=true;document.getElementById('difficulty-modal').style.display='none';initGame();}
function hideDifficulty(){document.getElementById('difficulty-modal').style.display='none';}

function initGame(){
  if(busy)return;
  busy=true;state=GS.PLAYING;aiRunning=false;roundNum=1;humanActedThisRound=false;humanTurnActive=false;
  document.getElementById('menu-screen').style.display='none';
  document.getElementById('game-screen').style.display='flex';
  document.getElementById('result-modal').style.display='none';
  pot=ANTE*4;curBet=ANTE;blindBet=ANTE*2;turnIdx=0;
  players=[
    {id:'me',name:'我',chips:1000-ANTE,active:true,cards:[]},
    {id:'ai1',name:'小智',chips:1000-ANTE,active:true,cards:[]},
    {id:'ai2',name:'小红',chips:1000-ANTE,active:true,cards:[]},
    {id:'ai3',name:'小刚',chips:1000-ANTE,active:true,cards:[]},
  ];
  seen={me:false,ai1:false,ai2:false,ai3:false};
  ['我','小智','小红','小刚'].forEach((n,i)=>{
    const s=i===0?'-me':'-'+(i);
    document.getElementById('name'+s).textContent=n;
    document.getElementById('chips'+s).textContent=players[i].chips;
    document.getElementById('player'+s).classList.remove('player-folded','player-lost','player-seen','current-turn');
  });
  document.querySelectorAll('.card').forEach(c=>{c.textContent='?';c.className='card hidden';});
  document.getElementById('my-chips').textContent=players[0].chips;
  document.getElementById('pot-amount').textContent=pot;
  document.getElementById('btn-look').disabled=false;
  document.getElementById('raise-control').style.display='none';
  document.getElementById('timer-fill').style.width='100%';
  dealCards();
  startHumanTurn();
  busy=false;
}

function dealCards(){
  const suits=['♥','♠','♦','♣'],points=['A','K','Q','J','10','9'];
  for(let p=0;p<4;p++){players[p].cards=[];for(let i=0;i<3;i++)players[p].cards.push(suits[Math.floor(Math.random()*4)]+points[Math.floor(Math.random()*6)]);}
  myCards=players[0].cards;
  document.querySelectorAll('.card').forEach((c,i)=>{c.classList.add('card-dealing');c.style.animationDelay=(i*0.06)+'s';});
  setTimeout(()=>{
    document.querySelectorAll('#cards-me .card').forEach((c,i)=>{const cr=myCards[i];c.textContent=cr;c.classList.remove('hidden');c.classList.add(red(cr)?'red':'black');});
    for(let i=1;i<=3;i++)document.querySelectorAll('#cards-'+i+' .card').forEach(c=>{c.textContent='🎴';c.classList.remove('hidden','red','black');});
  },600);
}

function startHumanTurn(){
  console.log('[Game] startHumanTurn, round',roundNum);
  turnIdx=0;highlightTurn();updateUI();enableBtns();
  turnEndTime=Date.now()+TURN_TIME*1000;startTurnTimer();
}

function startTurnTimer(){
  clearInterval(turnTimer);
  turnTimer=setInterval(()=>{
    const left=Math.max(0,turnEndTime-Date.now());
    const fill=document.getElementById('timer-fill');
    if(fill)fill.style.width=(left/(TURN_TIME*1000)*100)+'%';
    if(left<=0){clearInterval(turnTimer);
      if(turnIdx===0&&players[0].active){toast('超时自动弃牌');doAction('fold');}
    }
  },100);
}

function doAction(type){
  console.log('[Game] doAction',type,'turnIdx=',turnIdx,'busy=',busy);
  if(state!==GS.PLAYING||busy||turnIdx!==0)return;
  busy=true;clearInterval(turnTimer);
  const me=players[0];
  if(!me.active){busy=false;return;}
  const hasSeen=seen.me;

  if(type==='fold'){
    me.active=false;humanActedThisRound=true;
    document.getElementById('player-me').classList.add('player-folded');
    toast('已弃牌');
    advanceAfterAction();
  } else if(type==='look'){
    if(!hasSeen){
      me.chips-=blindBet;pot+=blindBet;seen.me=true;
      document.getElementById('player-me').classList.add('player-seen');
      document.querySelectorAll('#cards-me .card').forEach((c,i)=>{c.textContent=myCards[i];c.classList.add(red(myCards[i])?'red':'black');});
      toast('看牌，暗注 '+blindBet);
    }
    humanActedThisRound=true;
    advanceAfterAction();
  } else if(type==='call'){
    const cost=hasSeen?curBet:blindBet;
    me.chips-=cost;pot+=cost;
    if(!hasSeen){seen.me=true;document.getElementById('player-me').classList.add('player-seen');}
    toast('跟注 '+cost);
    humanActedThisRound=true;
    updateUI();advanceAfterAction();
  } else if(type==='raise'){
    const raiseAmt=+document.getElementById('raise-slider').value||100;
    const total=(hasSeen?curBet:blindBet)+raiseAmt;
    if(total>me.chips){toast('筹码不足！');busy=false;enableBtns();startTurnTimer();return;}
    me.chips-=total;pot+=total;curBet+=raiseAmt;blindBet=curBet*2;
    seen.me=true;document.getElementById('player-me').classList.add('player-seen');
    toast('加注 '+(hasSeen?'':'(暗)')+total);
    humanActedThisRound=true;
    updateUI();advanceAfterAction();
  }
}

// 任何人行动完后调用，推进到下一个人
function advanceAfterAction(){
  const active=players.filter(p=>p.active);
  console.log('[Game] advanceAfterAction, active=',active.length);
  if(active.length<=1){endGame();return;}
  if(active.length===2){endGame();return;}
  // 找下一个活跃玩家（顺时针）
  let next=-1;
  for(let i=1;i<=3;i++){
    const idx=(turnIdx+i)%4;
    if(players[idx]&&players[idx].active){next=idx;break;}
  }
  if(next===-1){endGame();return;}

  turnIdx=next;highlightTurn();
  console.log("[Game] advanceAfterAction: turnIdx=",turnIdx,"active=",active.length);

  if(turnIdx===0){
    // 回到人类：检查本轮人类是否已行动
    if(humanActedThisRound){
      roundNum++;
      humanActedThisRound=false;
      console.log('[Game] New round',roundNum);
    }
    humanTurnActive=true;busy=false;startHumanTurn();
  } else {
    startAITurn(turnIdx);
  }
}

function startAITurn(idx){
  if(aiRunning){console.log('[Game] startAITurn BLOCKED');return;}
  aiRunning=true;turnIdx=idx;highlightTurn();disableBtns();
  setTimeout(()=>runAIAction(idx),400+Math.random()*400);
}

function runAIAction(idx){
  if(state!==GS.PLAYING||turnIdx!==idx){aiRunning=false;return;}
  clearInterval(turnTimer);
  const ai=players[idx];
  if(!ai||!ai.active){aiRunning=false;advanceAfterAction();return;}
  const hasSeen=seen[ai.id];
  const bet=hasSeen?curBet:blindBet;
  const r=Math.random();
  let action;
  if(r<0.15)action='fold';
  else if(r<0.4)action='look';
  else if(r<0.78)action='call';
  else action='raise';

  console.log('[Game] AI',ai.name,'action:',action);

  if(action==='fold'){
    ai.active=false;
    document.getElementById('player-'+idx).classList.add('player-folded');
    toast(ai.name+' 弃牌');
    aiRunning=false;advanceAfterAction();
  } else {
    let cost=action==='look'?blindBet:(action==='call'?bet:bet+50+Math.floor(Math.random()*100));
    if(cost>ai.chips||cost<=0){toast(ai.name+' 弃牌');ai.active=false;document.getElementById('player-'+idx).classList.add('player-folded');updateUI();aiRunning=false;advanceAfterAction();return;}
    ai.chips-=cost;pot+=cost;seen[ai.id]=true;
    document.getElementById('player-'+idx).classList.add('player-seen');
    if(action==='look'){
      toast(ai.name+' 看牌，暗注 '+cost);
      document.querySelectorAll('#cards-'+idx+' .card').forEach((c,j)=>{const cr=ai.cards[j];c.textContent=cr;c.classList.remove('hidden');c.classList.add(red(cr)?'red':'black');});
    } else if(action==='call'){toast(ai.name+' 跟注 '+cost);}
    else{curBet+=cost-bet;blindBet=curBet*2;toast(ai.name+' 加注 '+cost);}
    updateUI();aiRunning=false;advanceAfterAction();
  }
}

function endGame(){
  console.log('[Game] endGame');clearInterval(turnTimer);aiRunning=false;state=GS.RESULT;disableBtns();highlightTurn();
  for(let i=1;i<=3;i++){
    if(!players[i].active)continue;
    document.querySelectorAll('#cards-'+i+' .card').forEach((c,j)=>{const cr=players[i].cards[j];c.textContent=cr;c.classList.remove('hidden');c.classList.add(red(cr)?'red':'black');});
  }
  setTimeout(()=>showResult(),1000);
}

function showResult(){
  const active=players.filter(p=>p.active);
  let title,text,chipsStr;
  const me=players[0];
  if(!me.active){
    if(active.length===1&&active[0].id==='me'){title='胜利';me.chips+=pot;text='获胜！';chipsStr='+'+pot;}
    else{title='失败';text='你已弃牌';chipsStr='0';}
  } else if(active.length===1){title='胜利';me.chips+=pot;text='所有对手弃牌！';chipsStr='+'+pot;}
  else{
    let best=active[0];
    for(const p of active)if(cmp(p.cards,best.cards)>0)best=p;
    const myC=cmp(me.cards,best.cards);
    if(myC>=0){title='胜利';me.chips+=pot;chipsStr='+'+pot;}
    else{title='失败';chipsStr='-'+(1000-ANTE-me.chips);}
    text='你的牌型：'+HN[handType(me.cards)];
  }
  const t=document.getElementById('result-title');
  t.textContent=title;t.className='result-title '+(title==='胜利'?'win':'lose');
  document.getElementById('result-hand').textContent=text;
  const c=document.getElementById('result-chips');
  c.textContent=chipsStr;c.className='result-chips '+(chipsStr>0?'win':'lose');
  document.getElementById('result-modal').style.display='flex';
  updateUI();
}

function highlightTurn(){
  document.querySelectorAll('.player-area').forEach(el=>el.classList.remove('current-turn'));
  const id=turnIdx===0?'player-me':'player-'+turnIdx;
  const el=document.getElementById(id);
  if(el)el.classList.add('current-turn');
}

function updateUI(){
  document.getElementById('chips-me').textContent=players[0].chips;
  document.getElementById('my-chips').textContent=players[0].chips;
  for(let i=1;i<=3;i++)document.getElementById('chips-'+i).textContent=players[i].chips;
  document.getElementById('pot-amount').textContent=pot;
  updateBtnTexts();
}

function updateBtnTexts(){
  const hasSeen=seen.me;
  const callCost=hasSeen?curBet:blindBet;
  document.getElementById('btn-call').textContent='跟注 '+callCost;
  document.getElementById('btn-look').textContent='看牌 '+blindBet;
  document.getElementById('btn-look').disabled=hasSeen;
  const slider=document.getElementById('raise-slider'),amountEl=document.getElementById('raise-amount');
  if(slider&&amountEl){
    const maxR=Math.max(50,Math.min(players[0].chips-callCost,500));
    slider.max=maxR;slider.value=Math.min(Math.floor(players[0].chips/4),200);
    amountEl.textContent=slider.value;
  }
}

function enableBtns(){
  console.log('[Game] enableBtns: state=',state,'turnIdx=',turnIdx,'p0active=',players[0]&&players[0].active);
  if(state!==GS.PLAYING||turnIdx!==0||!players[0].active)return;
  ['btn-fold','btn-look','btn-call','btn-raise'].forEach(id=>{const b=document.getElementById(id);if(b)b.disabled=false;});
  updateBtnTexts();
}
function disableBtns(){['btn-fold','btn-look','btn-call','btn-raise'].forEach(id=>{const b=document.getElementById(id);if(b)b.disabled=true;});}

function exitGame(){if(confirm('确定要退出游戏吗？')){clearInterval(turnTimer);document.getElementById('game-screen').style.display='none';document.getElementById('menu-screen').style.display='flex';state=GS.MENU;busy=false;aiRunning=false;}}
function backToMenu(){document.getElementById('result-modal').style.display='none';document.getElementById('game-screen').style.display='none';document.getElementById('menu-screen').style.display='flex';state=GS.MENU;busy=false;aiRunning=false;}
function playAgain(){document.getElementById('result-modal').style.display='none';initGame();}
function showRecord(){alert('战绩功能即将上线！');}
function toast(msg){console.log('[Toast]',msg);const el=document.getElementById('toast');if(el){el.textContent=msg;el.style.display='block';el.style.opacity='1';setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.style.display='none',300);},2500);}}
</script>
