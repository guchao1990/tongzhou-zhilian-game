<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>炸金花 - 同舟智联</title>
  <style>
    /* ============ 全局样式 ============ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --primary: #1B5E20;
      --primary-light: #2E7D32;
      --accent: #FFD700;
      --accent-light: #FFE082;
      --bg: #0D1B0F;
      --bg-table: #1A3D1C;
      --text: #FFFFFF;
      --text-gold: #FFE082;
      --danger: #F44336;
      --success: #4CAF50;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    /* ============ 加载页 ============ */
    #loading-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .loading-title {
      font-size: 32px;
      font-weight: bold;
      color: var(--accent);
      margin-bottom: 30px;
      text-shadow: 0 2px 10px rgba(255, 215, 0, 0.3);
    }

    .loading-bar {
      width: 200px;
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
    }

    .loading-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary-light), var(--accent));
      width: 0%;
      transition: width 0.3s;
    }

    .loading-tip {
      margin-top: 15px;
      font-size: 14px;
      color: rgba(255,255,255,0.5);
    }

    /* ============ 主菜单 ============ */
    #menu-screen {
      display: none;
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, var(--bg) 0%, #0a2a0f 100%);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .menu-logo {
      font-size: 42px;
      font-weight: bold;
      color: var(--accent);
      text-shadow: 0 0 20px rgba(255,215,0,0.5);
      margin-bottom: 10px;
    }

    .menu-subtitle {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 60px;
    }

    .menu-btn {
      width: 280px;
      padding: 16px;
      margin: 10px 0;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .menu-btn:active {
      transform: scale(0.96);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      color: white;
      box-shadow: 0 4px 15px rgba(46, 125, 50, 0.4);
    }

    .btn-accent {
      background: linear-gradient(135deg, #FF8F00, #FF6F00);
      color: white;
      box-shadow: 0 4px 15px rgba(255, 111, 0, 0.4);
    }

    .btn-outline {
      background: transparent;
      border: 2px solid rgba(255,255,255,0.3);
      color: white;
    }

    .menu-footer {
      position: absolute;
      bottom: 30px;
      font-size: 12px;
      color: rgba(255,255,255,0.3);
    }

    /* ============ 难度选择 ============ */
    #difficulty-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal-content {
      background: var(--bg-table);
      border-radius: 20px;
      padding: 30px;
      width: 300px;
      text-align: center;
    }

    .modal-title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 20px;
      color: var(--accent);
    }

    .diff-btn {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      background: rgba(255,255,255,0.1);
      color: white;
      transition: background 0.2s;
    }

    .diff-btn:active {
      background: rgba(255,255,255,0.2);
    }

    .diff-btn.easy { border-left: 3px solid #4CAF50; }
    .diff-btn.normal { border-left: 3px solid #FF9800; }
    .diff-btn.hard { border-left: 3px solid #F44336; }

    /* ============ 游戏桌 ============ */
    #game-screen {
      display: none;
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, var(--bg-table) 0%, var(--bg) 100%);
      flex-direction: column;
    }

    /* 顶部栏 */
    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 15px;
      background: rgba(0,0,0,0.3);
    }

    .game-info {
      display: flex;
      gap: 15px;
      font-size: 14px;
    }

    .info-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .info-icon {
      font-size: 16px;
    }

    .btn-back {
      background: rgba(255,255,255,0.1);
      border: none;
      color: white;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }

    /* 牌桌 */
    .game-table {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 20px;
    }

    .table-center {
      width: 200px;
      height: 120px;
      background: radial-gradient(ellipse, #2E5A2E 0%, #1B3D1B 100%);
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 8px solid #3D7A3D;
      box-shadow: 0 0 30px rgba(0,0,0,0.5), inset 0 0 30px rgba(0,0,0,0.3);
    }

    .pot-label {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
    }

    .pot-amount {
      font-size: 28px;
      font-weight: bold;
      color: var(--accent);
      text-shadow: 0 0 10px rgba(255,215,0,0.5);
    }

    .round-info {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      margin-top: 5px;
    }

    /* 玩家区域 */
    .player-area {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .player-area.top-left { top: 20px; left: 20px; }
    .player-area.top-right { top: 20px; right: 20px; }
    .player-area.bottom-left { bottom: 180px; left: 20px; }
    .player-area.bottom-right { bottom: 180px; right: 20px; }
    .player-area.bottom { bottom: 20px; left: 50%; transform: translateX(-50%); }

    .player-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      border: 3px solid rgba(255,255,255,0.2);
      position: relative;
    }

    .player-avatar.dealer::after {
      content: '庄';
      position: absolute;
      top: -8px;
      right: -8px;
      width: 20px;
      height: 20px;
      background: var(--accent);
      color: #000;
      border-radius: 50%;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    .player-avatar.online::before {
      content: '';
      position: absolute;
      bottom: 0;
      right: 0;
      width: 12px;
      height: 12px;
      background: var(--success);
      border-radius: 50%;
      border: 2px solid var(--bg);
    }

    .player-name {
      font-size: 12px;
      color: white;
      max-width: 70px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .player-chips {
      font-size: 11px;
      color: var(--accent);
    }

    /* 手牌 */
    .cards-row {
      display: flex;
      gap: 5px;
    }

    .card {
      width: 45px;
      height: 65px;
      background: white;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: bold;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      position: relative;
      transition: transform 0.3s;

    .card.red { color: #E53935; }
    .card.black { color: #212121; }
    .card.hidden {
      background: linear-gradient(135deg, #1B5E20, #2E7D32);
      color: transparent;
    }
    .card.hidden::after {
      content: '?';
      color: rgba(255,255,255,0.3);

    .card:active {

    .player-area.current-turn .player-avatar {
      box-shadow: 0 0 0 3px var(--accent), 0 0 20px rgba(255,215,0,0.5);
    }

    /* 操作区 */
    .action-area {
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      padding: 15px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .action-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 10px;
    }

    .action-btn {
      flex: 1;
      max-width: 120px;
      padding: 12px 8px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }

    .action-btn:active {
      transform: scale(0.95);
    }

    .action-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-fold {
      background: #616161;
      color: white;
    }
    .btn-call {
      background: #1565C0;
      color: white;
    }
    .btn-raise {
      background: #F57C00;
      color: white;
    }
    .btn-look {
      background: #388E3C;
      color: white;
    }

    .raise-control {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
    }

    .raise-slider {
      flex: 1;
      max-width: 200px;
      -webkit-appearance: none;
      height: 6px;
      border-radius: 3px;
      background: rgba(255,255,255,0.2);
    }

    .raise-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }

    .raise-amount {
      min-width: 60px;
      text-align: center;
      font-size: 14px;
      color: var(--accent);
    }

    /* 计时器 */
    .timer-bar {
      height: 4px;
      background: rgba(255,255,255,0.1);
      width: 100%;
    }

    .timer-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--success), var(--accent));
      width: 100%;
      transition: width 0.5s linear;
    }

    /* ============ 结果弹窗 ============ */
    #result-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      align-items: center;
      justify-content: center;
      z-index: 200;
    }

    .result-content {
      background: linear-gradient(180deg, var(--bg-table), var(--bg));
      border-radius: 20px;
      padding: 30px;
      width: 320px;
      text-align: center;
      border: 2px solid var(--accent);
    }

    .result-title {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .result-title.win { color: var(--accent); }
    .result-title.lose { color: #F44336; }

    .result-hand {
      font-size: 18px;
      color: white;
      margin-bottom: 20px;
    }

    .result-chips {
      font-size: 36px;
      font-weight: bold;
      margin-bottom: 25px;
    }

    .result-chips.win { color: var(--success); }
    .result-chips.lose { color: var(--danger); }

    .result-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      color: white;
      margin: 5px 0;
    }

    /* ============ 动画 ============ */
    @keyframes cardDeal {
      from {
        transform: translateY(-200px) rotate(180deg) scale(0.5);
        opacity: 0;
      }
      to {
        transform: translateY(0) rotate(0) scale(1);
        opacity: 1;
      }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    .card-dealing {
      animation: cardDeal 0.4s ease-out;
    }

    .pulse {
      animation: pulse 1s infinite;
    }

    .fade-in {
      animation: fadeIn 0.3s ease-out;
    }
  </style>
</head>

<script>
/* ============================================
 * 炸金花游戏 - 最终修复版
 * ============================================ */

const GameState = { MENU: 'menu', LOADING: 'loading', PLAYING: 'playing', RESULT: 'result' };
const HandRank = { SINGLE: 1, PAIR: 2, STRAIGHT: 3, FLUSH: 4, BOMB: 5 };
const HandName = { 1: '单张', 2: '对子', 3: '顺子', 4: '金花', 5: '炸弹' };
const ANTE = 50;

let currentState = GameState.LOADING;
let gameRoomId = null;
let turnTimer = null;
let turnTimeLeft = 20;
let players = [];
let myCards = [];
let potAmount = 0;
let currentBet = 0;
let blindBet = 0;
let activePlayerIdx = 0;
let seenMap = {};
let actionLog = [];
let isProcessing = false; // 防止重复触发

// ============ 牌型 ============
function getCardValue(card) {
  const map = { 'A': 14, 'K': 13, 'Q': 12, 'J': 11, '10': 10, '9': 9 };
  return map[card.substring(1)] || parseInt(card.substring(1));
}
function getCardSuit(card) { return card[0]; }
function isRed(card) { const s = getCardSuit(card); return s === '♥' || s === '♦'; }

function getHandType(cards) {
  if (!cards || cards.length !== 3) return HandRank.SINGLE;
  const values = cards.map(c => getCardValue(c)).sort((a, b) => a - b);
  const suits = cards.map(c => getCardSuit(c));
  const isFlush = suits.every(s => s === suits[0]);
  const isStraight = values[2] - values[1] === 1 && values[1] - values[0] === 1;
  const isBomb = values[0] === values[1] && values[1] === values[2];
  const isPair = values[0] === values[1] || values[1] === values[2];
  if (isBomb) return HandRank.BOMB;
  if (isFlush && isStraight) return HandRank.STRAIGHT;
  if (isFlush) return HandRank.FLUSH;
  if (isStraight) return HandRank.STRAIGHT;
  if (isPair) return HandRank.PAIR;
  return HandRank.SINGLE;
}

function compareHands(a, b) {
  const ta = getHandType(a), tb = getHandType(b);
  if (ta !== tb) return ta > tb ? 1 : -1;
  const va = a.map(c => getCardValue(c)).sort((x, y) => x - y);
  const vb = b.map(c => getCardValue(c)).sort((x, y) => x - y);
  if (ta === HandRank.PAIR) {
    const pa = va[1], pb = vb[1];
    if (pa !== pb) return pa > pb ? 1 : -1;
    const sa = va[0] === va[1] ? va[2] : va[0];
    const sb = vb[0] === vb[1] ? vb[2] : vb[0];
    return sa > sb ? 1 : (sa < sb ? -1 : 0);
  }
  for (let i = 2; i >= 0; i--) { if (va[i] !== vb[i]) return va[i] > vb[i] ? 1 : -1; }
  return 0;
}

// ============ 初始化 ============
document.addEventListener('DOMContentLoaded', () => { simulateLoading(); });

function simulateLoading() {
  const fill = document.getElementById('loading-fill');
  const tip = document.getElementById('loading-tip');
  const tips = ['正在加载扑克牌资源...', '正在初始化游戏引擎...', '正在连接服务器...', '准备就绪!'];
  let progress = 0;
  const iv = setInterval(() => {
    progress += Math.random() * 25;
    if (progress >= 100) { progress = 100; clearInterval(iv); setTimeout(() => {
      document.getElementById('loading-screen').style.display = 'none';
      document.getElementById('menu-screen').style.display = 'flex';
      currentState = GameState.MENU;
    }, 500); }
    fill.style.width = progress + '%';
    tip.textContent = tips[Math.floor(progress / 25)] || tips[3];
  }, 300);
}

function startGame(mode) {
  if (mode === 'ai') document.getElementById('difficulty-modal').style.display = 'flex';
  else alert('在线模式即将上线，请先体验人机对战！');
}
function confirmDifficulty() {
  document.getElementById('difficulty-modal').style.display = 'none';
  initGame();
}
function hideDifficulty() { document.getElementById('difficulty-modal').style.display = 'none'; }

function initGame() {
  // 防止重复初始化
  if (isProcessing) return;
  isProcessing = true;

  document.getElementById('menu-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'flex';
  document.getElementById('result-modal').style.display = 'none';
  currentState = GameState.PLAYING;
  gameRoomId = 'R' + Date.now().toString(36).toUpperCase();
  potAmount = ANTE * 4;
  currentBet = ANTE;
  blindBet = ANTE * 2;
  actionLog = [];
  isProcessing = false;

  players = [
    { id: 'me',    name: '我',   chips: 1000, active: true, cards: [] },
    { id: 'ai_1', name: '小智', chips: 1000, active: true, cards: [] },
    { id: 'ai_2', name: '小红', chips: 1000, active: true, cards: [] },
    { id: 'ai_3', name: '小刚', chips: 1000, active: true, cards: [] },
  ];
  seenMap = { 'me': false, 'ai_1': false, 'ai_2': false, 'ai_3': false };

  // 初始化显示 - 明确指定每个位置的名字
  document.getElementById('name-me').textContent = '我';
  document.getElementById('chips-me').textContent = '1000';
  document.getElementById('player-me').className = 'player-area bottom';
  document.getElementById('player-me').classList.remove('player-folded', 'player-lost', 'player-seen');

  for (let i = 1; i <= 3; i++) {
    const ai = players[i];
    document.getElementById('name-' + i).textContent = ai.name;
    document.getElementById('chips-' + i).textContent = ai.chips;
    document.getElementById('player-' + i).classList.remove('player-folded', 'player-lost', 'player-seen');
  }

  // 重置所有卡牌
  document.querySelectorAll('.card').forEach(c => { c.textContent = '?'; c.className = 'card hidden'; });

  document.getElementById('my-chips').textContent = '1000';
  document.getElementById('pot-amount').textContent = potAmount + '';
  document.getElementById('btn-call').textContent = '跟注 ' + ANTE;
  document.getElementById('btn-look').textContent = '看牌 ' + blindBet;
  document.getElementById('btn-look').disabled = false;
  document.getElementById('raise-control').style.display = 'none';

  // 扣底注
  for (let i = 0; i < 4; i++) { players[i].chips -= ANTE; }
  updateAllDisplays();
  dealCards();
  activePlayerIdx = 0;
  highlightActive();
  startTurnTimer();
}

// ============ 发牌 ============
function dealCards() {
  const suits = ['♥', '♠', '♦', '♣'];
  const points = ['A', 'K', 'Q', 'J', '10', '9'];
  for (let p = 0; p < 4; p++) {
    players[p].cards = [];
    for (let i = 0; i < 3; i++) {
      players[p].cards.push(suits[Math.floor(Math.random() * 4)] + points[Math.floor(Math.random() * 6)]);
    }
  }
  myCards = players[0].cards;

  const allCards = document.querySelectorAll('.card');
  allCards.forEach((c, i) => {
    c.classList.add('card-dealing');
    c.style.animationDelay = (i * 0.07) + 's';
  });

  setTimeout(() => {
    // 显示我的牌
    const myCardEls = document.querySelectorAll('#cards-me .card');
    myCardEls.forEach((card, i) => {
      const c = myCards[i];
      card.textContent = c;
      card.classList.remove('hidden');
      card.classList.add(isRed(c) ? 'red' : 'black');
    });
    // AI暗牌
    for (let i = 1; i <= 3; i++) {
      document.querySelectorAll('#cards-' + i + ' .card').forEach(card => {
        card.textContent = '🎴';
        card.classList.remove('hidden', 'red', 'black');
      });
    }
    enableButtons();
    isProcessing = false;
  }, 700);
}

// ============ 操作 ============
function doAction(type) {
  if (currentState !== GameState.PLAYING) return;
  if (isProcessing) return;
  if (activePlayerIdx !== 0) return;

  isProcessing = true;
  clearInterval(turnTimer);
  disableButtons();

  const me = players[0];
  if (!me.active) { isProcessing = false; return; }

  const seen = seenMap['me'];
  if (type === 'fold') {
    me.active = false;
    document.getElementById('player-me').classList.add('player-folded');
    showToast('已弃牌');
    actionLog.push({ idx: 0, type: 'fold' });
    setTimeout(() => { isProcessing = false; advanceToNext(); }, 300);
  } else if (type === 'look') {
    if (!seen) {
      const cost = blindBet;
      me.chips -= cost;
      potAmount += cost;
      seenMap['me'] = true;
      document.getElementById('player-me').classList.add('player-seen');
      showToast('看牌，暗注 ' + cost);
      actionLog.push({ idx: 0, type: 'look', amount: cost });
      updateAllDisplays();
    }
    setTimeout(() => { isProcessing = false; advanceToNext(); }, 300);
  } else if (type === 'call') {
    const cost = seen ? currentBet : blindBet;
    me.chips -= cost;
    potAmount += cost;
    if (!seen) seenMap['me'] = true;
    document.getElementById('player-me').classList.add('player-seen');
    showToast('跟注 ' + cost);
    actionLog.push({ idx: 0, type: 'call', amount: cost });
    updateAllDisplays();
    setTimeout(() => { isProcessing = false; advanceToNext(); }, 300);
  } else if (type === 'raise') {
    const raiseAmt = parseInt(document.getElementById('raise-amount') ? document.getElementById('raise-amount').value : 100);
    const total = (seen ? currentBet : blindBet) + raiseAmt;
    if (total > me.chips) { showToast('筹码不足！'); enableButtons(); isProcessing = false; return; }
    me.chips -= total;
    potAmount += total;
    currentBet += raiseAmt;
    blindBet = currentBet * 2;
    seenMap['me'] = true;
    document.getElementById('player-me').classList.add('player-seen');
    showToast('加注 ' + total);
    actionLog.push({ idx: 0, type: 'raise', amount: total });
    updateAllDisplays();
    setTimeout(() => { isProcessing = false; advanceToNext(); }, 300);
  }
}

function advanceToNext() {
  const active = players.filter(p => p.active);
  if (active.length <= 1) { endGame(); return; }
  if (active.length === 2) { endGame(); return; }

  // 找下一个活跃玩家
  let next = -1;
  for (let i = 1; i <= 3; i++) {
    const idx = (activePlayerIdx + i) % 4;
    if (players[idx] && players[idx].active) { next = idx; break; }
  }
  if (next === -1) { endGame(); return; }

  activePlayerIdx = next;
  highlightActive();

  if (next === 0) {
    enableButtons();
    startTurnTimer();
  } else {
    disableButtons();
    startTurnTimer();
    setTimeout(() => doAIAction(next), 500);
  }
}

function doAIAction(aiIdx) {
  if (currentState !== GameState.PLAYING) return;
  clearInterval(turnTimer);

  const ai = players[aiIdx];
  if (!ai || !ai.active) { advanceToNext(); return; }

  const hasSeen = seenMap[ai.id];
  const bet = hasSeen ? currentBet : blindBet;
  const rand = Math.random();
  let action = null;

  if (rand < 0.15) {
    action = 'fold';
  } else if (rand < 0.4) {
    action = 'look';
  } else if (rand < 0.75) {
    action = 'call';
  } else {
    action = 'raise';
  }

  if (action === 'fold') {
    ai.active = false;
    document.getElementById('player-' + aiIdx).classList.add('player-folded');
    showToast(ai.name + ' 弃牌');
    setTimeout(() => advanceToNext(), 600);
  } else {
    let cost = action === 'look' ? blindBet : (action === 'call' ? bet : bet + 50 + Math.floor(Math.random() * 100));
    if (cost > ai.chips) cost = ai.chips;
    if (cost <= 0) { ai.active = false; document.getElementById('player-' + aiIdx).classList.add('player-folded'); showToast(ai.name + ' 弃牌'); setTimeout(() => advanceToNext(), 600); return; }
    ai.chips -= cost;
    potAmount += cost;
    seenMap[ai.id] = true;
    document.getElementById('player-' + aiIdx).classList.add('player-seen');

    if (action === 'look') {
      showToast(ai.name + ' 看牌，暗注 ' + cost);
      const aiCardEls = document.querySelectorAll('#cards-' + aiIdx + ' .card');
      aiCardEls.forEach((card, j) => {
        const c = ai.cards[j];
        card.textContent = c;
        card.classList.remove('hidden');
        card.classList.add(isRed(c) ? 'red' : 'black');
      });
    } else if (action === 'call') {
      showToast(ai.name + ' 跟注 ' + cost);
    } else if (action === 'raise') {
      currentBet += (cost - bet);
      blindBet = currentBet * 2;
      showToast(ai.name + ' 加注 ' + cost);
    }
    updateAllDisplays();
    setTimeout(() => advanceToNext(), 800);
  }
}

function highlightActive() {
  document.querySelectorAll('.player-area').forEach(el => el.classList.remove('current-turn'));
  const id = activePlayerIdx === 0 ? 'player-me' : 'player-' + activePlayerIdx;
  const el = document.getElementById(id);
  if (el) el.classList.add('current-turn');
}

function updateAllDisplays() {
  document.getElementById('chips-me').textContent = players[0].chips;
  document.getElementById('my-chips').textContent = players[0].chips;
  for (let i = 1; i <= 3; i++) {
    const el = document.getElementById('chips-' + i);
    if (el) el.textContent = players[i].chips;
  }
  document.getElementById('pot-amount').textContent = potAmount;
  updateBetButtons();
}

function updateBetButtons() {
  const me = players[0];
  if (!me || !me.active) return;
  const seen = seenMap['me'];
  document.getElementById('btn-call').textContent = '跟注 ' + (seen ? currentBet : blindBet);
  document.getElementById('btn-look').textContent = '看牌 ' + blindBet;
  document.getElementById('btn-look').disabled = seen;
  document.getElementById('raise-control').style.display = 'block';
  const maxRaise = Math.min(me.chips - (seen ? currentBet : blindBet), 500);
  const slider = document.getElementById('raise-slider');
  const amountEl = document.getElementById('raise-amount');
  if (slider) slider.max = Math.max(maxRaise, 50);
  if (slider) slider.value = Math.min(Math.floor(me.chips / 4), 200);
  if (amountEl) amountEl.textContent = slider ? slider.value : 100;
}

function updateRaiseAmount() {
  const slider = document.getElementById('raise-slider');
  const amountEl = document.getElementById('raise-amount');
  if (amountEl && slider) amountEl.textContent = slider.value;
}

// ============ 结束 ============
function endGame() {
  clearInterval(turnTimer);
  disableButtons();
  currentState = GameState.RESULT;
  highlightActive();

  for (let i = 1; i <= 3; i++) {
    if (!players[i].active) continue;
    const aiCardEls = document.querySelectorAll('#cards-' + i + ' .card');
    aiCardEls.forEach((card, j) => {
      const c = players[i].cards[j];
      card.textContent = c;
      card.classList.remove('hidden');
      card.classList.add(isRed(c) ? 'red' : 'black');
    });
  }
  setTimeout(() => showResult(), 1000);
}

function showResult() {
  const active = players.filter(p => p.active);
  let resultTitle, resultText, resultChips;

  if (!players[0].active) {
    resultTitle = active.length === 1 && active[0].id === 'me' ? '胜利' : '失败';
    resultText = players[0].active ? '你获胜！' : '你已弃牌';
    resultChips = players[0].active ? '+' + potAmount : 0;
    if (players[0].active) players[0].chips += potAmount;
  } else if (active.length === 1) {
    resultTitle = '胜利';
    players[0].chips += potAmount;
    resultText = '所有对手弃牌！';
    resultChips = '+' + potAmount;
  } else {
    let best = active[0];
    for (const p of active) { if (compareHands(p.cards, best.cards) > 0) best = p; }
    const myBest = compareHands(players[0].cards, best.cards);
    if (myBest >= 0) {
      resultTitle = '胜利'; players[0].chips += potAmount;
      resultChips = '+' + potAmount;
    } else {
      resultTitle = '失败';
      resultChips = '-' + (1000 - players[0].chips);
    }
    resultText = '你的牌型：' + HandName[getHandType(players[0].cards)];
  }

  const titleEl = document.getElementById('result-title');
  titleEl.textContent = resultTitle;
  titleEl.className = 'result-title ' + (resultTitle === '胜利' ? 'win' : 'lose');
  document.getElementById('result-hand').textContent = resultText;
  const chipsEl = document.getElementById('result-chips');
  chipsEl.textContent = resultChips;
  chipsEl.className = 'result-chips ' + (resultChips > 0 ? 'win' : 'lose');
  document.getElementById('result-modal').style.display = 'flex';
  updateAllDisplays();
}

// ============ 计时器 ============
function startTurnTimer() {
  turnTimeLeft = 20;
  clearInterval(turnTimer);
  const fill = document.getElementById('timer-fill');
  if (fill) fill.style.width = '100%';
  turnTimer = setInterval(() => {
    turnTimeLeft -= 0.5;
    const fill = document.getElementById('timer-fill');
    if (fill) fill.style.width = (turnTimeLeft / 20 * 100) + '%';
    if (turnTimeLeft <= 0) {
      clearInterval(turnTimer);
      if (activePlayerIdx === 0 && players[0].active) {
        showToast('超时自动弃牌');
        doAction('fold');
      }
    }
  }, 500);
}

// ============ 按钮 ============
function enableButtons() {
  if (currentState !== GameState.PLAYING) return;
  if (activePlayerIdx !== 0) return;
  const me = players[0];
  if (!me || !me.active) return;
  ['btn-fold', 'btn-look', 'btn-call', 'btn-raise'].forEach(id => {
    const b = document.getElementById(id); if (b) b.disabled = false;
  });
  updateBetButtons();
}
function disableButtons() {
  ['btn-fold', 'btn-look', 'btn-call', 'btn-raise'].forEach(id => {
    const b = document.getElementById(id); if (b) b.disabled = true;
  });
}

// ============ UI ============
function exitGame() {
  if (confirm('确定要退出游戏吗？')) {
    clearInterval(turnTimer);
    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('menu-screen').style.display = 'flex';
    currentState = GameState.MENU;
    isProcessing = false;
  }
}
function backToMenu() {
  document.getElementById('result-modal').style.display = 'none';
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('menu-screen').style.display = 'flex';
  currentState = GameState.MENU;
  isProcessing = false;
}
function playAgain() {
  document.getElementById('result-modal').style.display = 'none';
  initGame();
}
function showRecord() { alert('战绩功能即将上线！'); }

function showToast(message) {
  console.log('[Toast]', message);
  const el = document.getElementById('toast');
  if (el) {
    el.textContent = message;
    el.style.display = 'block';
    el.style.opacity = '1';
    setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.style.display = 'none', 300); }, 2500);
  }
}
