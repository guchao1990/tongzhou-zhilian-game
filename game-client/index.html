<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>炸金花 - 同舟智联</title>
  <style>
    /* ============ 全局样式 ============ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --primary: #1B5E20;
      --primary-light: #2E7D32;
      --accent: #FFD700;
      --accent-light: #FFE082;
      --bg: #0D1B0F;
      --bg-table: #1A3D1C;
      --text: #FFFFFF;
      --text-gold: #FFE082;
      --danger: #F44336;
      --success: #4CAF50;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    /* ============ 加载页 ============ */
    #loading-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .loading-title {
      font-size: 32px;
      font-weight: bold;
      color: var(--accent);
      margin-bottom: 30px;
      text-shadow: 0 2px 10px rgba(255, 215, 0, 0.3);
    }

    .loading-bar {
      width: 200px;
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
    }

    .loading-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary-light), var(--accent));
      width: 0%;
      transition: width 0.3s;
    }

    .loading-tip {
      margin-top: 15px;
      font-size: 14px;
      color: rgba(255,255,255,0.5);
    }

    /* ============ 主菜单 ============ */
    #menu-screen {
      display: none;
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, var(--bg) 0%, #0a2a0f 100%);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .menu-logo {
      font-size: 42px;
      font-weight: bold;
      color: var(--accent);
      text-shadow: 0 0 20px rgba(255,215,0,0.5);
      margin-bottom: 10px;
    }

    .menu-subtitle {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 60px;
    }

    .menu-btn {
      width: 280px;
      padding: 16px;
      margin: 10px 0;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .menu-btn:active {
      transform: scale(0.96);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      color: white;
      box-shadow: 0 4px 15px rgba(46, 125, 50, 0.4);
    }

    .btn-accent {
      background: linear-gradient(135deg, #FF8F00, #FF6F00);
      color: white;
      box-shadow: 0 4px 15px rgba(255, 111, 0, 0.4);
    }

    .btn-outline {
      background: transparent;
      border: 2px solid rgba(255,255,255,0.3);
      color: white;
    }

    .menu-footer {
      position: absolute;
      bottom: 30px;
      font-size: 12px;
      color: rgba(255,255,255,0.3);
    }

    /* ============ 难度选择 ============ */
    #difficulty-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal-content {
      background: var(--bg-table);
      border-radius: 20px;
      padding: 30px;
      width: 300px;
      text-align: center;
    }

    .modal-title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 20px;
      color: var(--accent);
    }

    .diff-btn {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      background: rgba(255,255,255,0.1);
      color: white;
      transition: background 0.2s;
    }

    .diff-btn:active {
      background: rgba(255,255,255,0.2);
    }

    .diff-btn.easy { border-left: 3px solid #4CAF50; }
    .diff-btn.normal { border-left: 3px solid #FF9800; }
    .diff-btn.hard { border-left: 3px solid #F44336; }

    /* ============ 游戏桌 ============ */
    #game-screen {
      display: none;
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, var(--bg-table) 0%, var(--bg) 100%);
      flex-direction: column;
    }

    /* 顶部栏 */
    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 15px;
      background: rgba(0,0,0,0.3);
    }

    .game-info {
      display: flex;
      gap: 15px;
      font-size: 14px;
    }

    .info-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .info-icon {

    }

    .btn-back {
      background: rgba(255,255,255,0.1);
      border: none;
      color: white;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;

    /* 牌桌 */

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 20px;

      border-radius: 50%;

    .pot-label {

      color: rgba(255,255,255,0.6);
    }

    .pot-amount {

      font-weight: bold;

      text-shadow: 0 0 10px rgba(255,215,0,0.5);

    .round-info {
      font-size: 12px;
      color: rgba(255,255,255,0.5);

    /* 玩家区域 */
    .player-area {
      position: absolute;
      display: flex;

      align-items: center;

    .player-area.top-left { top: 20px; left: 20px; }
    .player-area.top-right { top: 20px; right: 20px; }
    .player-area.bottom-left { bottom: 180px; left: 20px; }
    .player-area.bottom-right { bottom: 180px; right: 20px; }
    .player-area.bottom { bottom: 20px; left: 50%; transform: translateX(-50%); }

    .player-avatar {

      height: 50px;
      border-radius: 50%;

      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      border: 3px solid rgba(255,255,255,0.2);
      position: relative;

    .player-avatar.dealer::after {
      content: '庄';
      position: absolute;
      top: -8px;
      right: -8px;
      width: 20px;
      height: 20px;

      color: #000;
      border-radius: 50%;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    .player-avatar.online::before {
      content: '';
      position: absolute;
      bottom: 0;
      right: 0;
      width: 12px;
      height: 12px;
      background: var(--success);
      border-radius: 50%;
      border: 2px solid var(--bg);

    .player-name {
      font-size: 12px;
      color: white;
      max-width: 70px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .player-chips {
      font-size: 11px;
      color: var(--accent);
    }

    /* 手牌 */
    .cards-row {
      display: flex;
      gap: 5px;
    }

    .card {

      height: 65px;
      background: white;
      border-radius: 6px;

      align-items: center;
      justify-content: center;

    .card.black { color: #212121; }

    /* 操作区 */
    .action-area {
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);

    .action-row {
      display: flex;
      gap: 10px;
      justify-content: center;

      max-width: 120px;

      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;

    }

    .action-btn:disabled {

    }

    .btn-fold {
      background: #616161;
      color: white;
    }
    .btn-call {
      background: #1565C0;
      color: white;
    }
    .btn-raise {
      background: #F57C00;
      color: white;
    }
    .btn-check {
      background: #388E3C;
      color: white;
    }

    .raise-control {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
    }

    .raise-slider {
      flex: 1;
      max-width: 200px;
      -webkit-appearance: none;
      height: 6px;
      border-radius: 3px;
      background: rgba(255,255,255,0.2);

    .raise-slider::-webkit-slider-thumb {

      width: 20px;
      height: 20px;
      border-radius: 50%;

      cursor: pointer;

    .raise-amount {
      min-width: 60px;
      text-align: center;
      font-size: 14px;

      height: 4px;
      background: rgba(255,255,255,0.1);
      width: 100%;
    }

    .timer-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--success), var(--accent));
      width: 100%;
      transition: width 0.5s linear;
    }

    /* ============ 结果弹窗 ============ */
    #result-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      align-items: center;
      justify-content: center;
      z-index: 200;
    }

    .result-content {
      background: linear-gradient(180deg, var(--bg-table), var(--bg));
      border-radius: 20px;
      padding: 30px;
      width: 320px;
      text-align: center;
      border: 2px solid var(--accent);
    }

    .result-title {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .result-title.win { color: var(--accent); }
    .result-title.lose { color: #F44336; }

    .result-hand {
      font-size: 18px;
      color: white;
      margin-bottom: 20px;
    }

    .result-chips {
      font-size: 36px;
      font-weight: bold;
      margin-bottom: 25px;
    }

    .result-chips.win { color: var(--success); }
    .result-chips.lose { color: var(--danger); }

    .result-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      color: white;
      margin: 5px 0;
    }

    /* ============ 动画 ============ */
    @keyframes cardDeal {
      from {
        transform: translateY(-200px) rotate(180deg) scale(0.5);
        opacity: 0;
      }
      to {
        transform: translateY(0) rotate(0) scale(1);
        opacity: 1;
      }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    .card-dealing {
      animation: cardDeal 0.4s ease-out;
    }

    .pulse {
      animation: pulse 1s infinite;
    }

    .fade-in {
      animation: fadeIn 0.3s ease-out;
    }
  </style>
</head>

<script>
/* ============================================
 * 炸金花游戏 - 前端逻辑（完整修复版）
 * ============================================ */

const GameState = { MENU: 'menu', LOADING: 'loading', PLAYING: 'playing', RESULT: 'result' };
const HandRank = { SINGLE: 1, PAIR: 2, STRAIGHT: 3, FLUSH: 4, BOMB: 5 };
const HandName = { 1: '单张', 2: '对子', 3: '顺子', 4: '金花', 5: '炸弹' };

let currentState = GameState.LOADING;
let gameRoomId = null;
let turnTimer = null;
let turnTimeLeft = 15;
let players = [];
let myCards = [];
let potAmount = 0;
let currentBet = 0;
let aiActionCount = 0;
let currentPlayerIdx = 0; // 0=human, 1-3=AI

// ============ 牌型判断 ============
function getCardValue(card) {
  const point = card.substring(1);
  const map = { 'A': 14, 'K': 13, 'Q': 12, 'J': 11, '10': 10, '9': 9 };
  return map[point] || parseInt(point);
}
function getCardSuit(card) { return card[0]; }

function getHandType(cards) {
  if (!cards || cards.length !== 3) return HandRank.SINGLE;
  const values = cards.map(c => getCardValue(c)).sort((a, b) => a - b);
  const suits = cards.map(c => getCardSuit(c));
  const isFlush = suits[0] === suits[1] && suits[1] === suits[2];
  const isStraight = (values[2] - values[1] === 1) && (values[1] - values[0] === 1);
  const isBomb = (values[0] === values[1]) && (values[1] === values[2]);
  const isPair = (values[0] === values[1]) || (values[1] === values[2]);
  if (isBomb) return HandRank.BOMB;
  if (isFlush && isStraight) return HandRank.STRAIGHT;
  if (isFlush) return HandRank.FLUSH;
  if (isStraight) return HandRank.STRAIGHT;
  if (isPair) return HandRank.PAIR;
  return HandRank.SINGLE;
}

function compareHands(myCards, oppCards) {
  const myType = getHandType(myCards);
  const oppType = getHandType(oppCards);
  if (myType !== oppType) return myType > oppType ? 1 : -1;
  const myVals = myCards.map(c => getCardValue(c)).sort((a, b) => a - b);
  const oppVals = oppCards.map(c => getCardValue(c)).sort((a, b) => a - b);
  if (myType === HandRank.PAIR) {
    const myPair = myVals[1];
    const oppPair = oppVals[1];
    if (myPair !== oppPair) return myPair > oppPair ? 1 : -1;
    const mySingle = myVals[0] === myVals[1] ? myVals[2] : myVals[0];
    const oppSingle = oppVals[0] === oppVals[1] ? oppVals[2] : oppVals[0];
    return mySingle > oppSingle ? 1 : (mySingle < oppSingle ? -1 : 0);
  }
  for (let i = 2; i >= 0; i--) {
    if (myVals[i] !== oppVals[i]) return myVals[i] > oppVals[i] ? 1 : -1;
  }
  return 0;
}

// ============ 初始化 ============
document.addEventListener('DOMContentLoaded', () => { simulateLoading(); });

function simulateLoading() {
  const fill = document.getElementById('loading-fill');
  const tip = document.getElementById('loading-tip');
  const tips = ['正在加载扑克牌资源...', '正在初始化游戏引擎...', '正在连接服务器...', '准备就绪!'];
  let progress = 0;
  const iv = setInterval(() => {
    progress += Math.random() * 25;
    if (progress >= 100) { progress = 100; clearInterval(iv); setTimeout(() => {
      document.getElementById('loading-screen').style.display = 'none';
      document.getElementById('menu-screen').style.display = 'flex';
      currentState = GameState.MENU;
    }, 500); }
    fill.style.width = progress + '%';
    tip.textContent = tips[Math.floor(progress / 25)] || tips[3];
  }, 300);
}

// ============ 游戏流程 ============
function startGame(mode) {
  if (mode === 'ai') document.getElementById('difficulty-modal').style.display = 'flex';
  else alert('在线模式即将上线，请先体验人机对战！');
}
function confirmDifficulty(diff) {
  document.getElementById('difficulty-modal').style.display = 'none';
  initGame();
}
function hideDifficulty() { document.getElementById('difficulty-modal').style.display = 'none'; }

function initGame() {
  document.getElementById('menu-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'flex';
  document.getElementById('result-modal').style.display = 'none';
  currentState = GameState.PLAYING;
  gameRoomId = 'R' + Date.now().toString(36).toUpperCase();
  potAmount = 0;
  currentBet = 0;
  aiActionCount = 0;
  currentPlayerIdx = 0;

  // players: [human, ai1, ai2, ai3]
  players = [
    { id: 'me',    name: '我',   chips: 1000, active: true, cards: [] },
    { id: 'ai_1', name: '小智', chips: 1000, active: true, cards: [] },
    { id: 'ai_2', name: '小红', chips: 1000, active: true, cards: [] },
    { id: 'ai_3', name: '小刚', chips: 1000, active: true, cards: [] },
  ];

  // Reset all player displays
  for (let i = 0; i < 4; i++) {
    const suffix = i === 0 ? '-me' : '-' + i;
    document.getElementById('name' + suffix).textContent = players[i].name;
    document.getElementById('chips' + suffix).textContent = players[i].chips;
    document.getElementById('player' + suffix).classList.remove('player-folded', 'player-lost');
    const cardEls = document.querySelectorAll('#cards' + suffix + ' .card');
    cardEls.forEach(c => { c.textContent = '?'; c.className = 'card hidden'; });
  }
  document.getElementById('my-chips').textContent = '1000';
  document.getElementById('pot-amount').textContent = '0';
  document.getElementById('raise-control').style.display = 'none';
  document.getElementById('btn-call').textContent = '跟注 0';

  dealCards();
  startTurnTimer();
}

function dealCards() {
  const suits = ['♥', '♠', '♦', '♣'];
  const points = ['A', 'K', 'Q', 'J', '10', '9'];
  for (let p = 0; p < 4; p++) {
    players[p].cards = [];
    for (let i = 0; i < 3; i++) {
      players[p].cards.push(suits[Math.floor(Math.random() * 4)] + points[Math.floor(Math.random() * 6)]);
    }
  }
  myCards = players[0].cards;

  // Animate deal
  const allCards = document.querySelectorAll('.card');
  allCards.forEach((card, i) => {
    card.classList.add('card-dealing');
    card.style.animationDelay = (i * 0.08) + 's';
  });

  setTimeout(() => {
    // Show my cards
    const myCardEls = document.querySelectorAll('#cards-me .card');
    myCardEls.forEach((card, i) => {
      const c = myCards[i];
      card.textContent = c;
      card.classList.remove('hidden');
      card.classList.add((getCardSuit(c) === '♥' || getCardSuit(c) === '♦') ? 'red' : 'black');
    });
    // AI cards hidden
    for (let i = 1; i <= 3; i++) {
      const aiCardEls = document.querySelectorAll('#cards-' + i + ' .card');
      aiCardEls.forEach(card => {
        card.textContent = '🎴';
        card.classList.remove('hidden', 'red', 'black');
      });
    }
    enableButtons();
    highlightCurrentPlayer(0);
    showToast('请选择操作');
  }, 700);
}

// ============ 操作 ============
function doAction(action) {
  if (currentState !== GameState.PLAYING || currentPlayerIdx !== 0) return;
  clearInterval(turnTimer);
  disableButtons();

  if (action === 'FOLD') {
    players[0].active = false;
    document.getElementById('player-me').classList.add('player-folded');
    showToast('已弃牌');
    setTimeout(() => advanceTurn(), 500);
  } else if (action === 'CHECK') {
    showToast('已看牌');
    setTimeout(() => advanceTurn(), 500);
  } else if (action === 'CALL') {
    players[0].chips -= 50;
    potAmount += 50;
    currentBet = 50;
    updateAllDisplays();
    showToast('跟注 50');
    setTimeout(() => advanceTurn(), 500);
  } else if (action === 'RAISE') {
    const raiseAmt = parseInt(document.getElementById('raise-amount').textContent);
    players[0].chips -= raiseAmt;
    potAmount += raiseAmt;
    currentBet = raiseAmt;
    updateAllDisplays();
    showToast('加注 ' + raiseAmt);
    setTimeout(() => advanceTurn(), 500);
  }
}

function advanceTurn() {
  aiActionCount++;
  // Find next active player
  let next = -1;
  for (let i = 1; i <= 3; i++) {
    if (players[i].active) { next = i; break; }
  }
  if (next === -1 || aiActionCount >= 12) {
    endGame(); return;
  }
  // AI turn
  currentPlayerIdx = next;
  highlightCurrentPlayer(next);
  setTimeout(() => doAITurn(next), 800);
}

function doAITurn(aiIdx) {
  const ai = players[aiIdx];
  if (!ai.active) { advanceTurn(); return; }

  const rand = Math.random();
  let action;
  if (rand < 0.2) {
    action = 'FOLD'; ai.active = false;
    document.getElementById('player-' + aiIdx).classList.add('player-folded');
    showToast(ai.name + ' 弃牌');
  } else if (rand < 0.6) {
    action = 'CALL'; ai.chips -= 50; potAmount += 50;
    showToast(ai.name + ' 跟注');
  } else {
    action = 'CHECK';
    showToast(ai.name + ' 看牌');
  }
  updateAllDisplays();
  setTimeout(() => {
    // Remove highlight, check if game continues
    highlightCurrentPlayer(-1);
    const activeAIs = players.slice(1).filter(p => p.active);
    if (activeAIs.length === 0) { endGame(); return; }
    if (!players[0].active) { advanceTurn(); return; }
    // Back to human
    currentPlayerIdx = 0;
    highlightCurrentPlayer(0);
    enableButtons();
    startTurnTimer();
  }, 1200);
}

function highlightCurrentPlayer(idx) {
  // Remove all highlights
  document.querySelectorAll('.player-area').forEach(el => el.classList.remove('current-turn'));
  if (idx >= 0) document.getElementById(idx === 0 ? 'player-me' : 'player-' + idx).classList.add('current-turn');
}

// ============ 显示更新 ============
function updateAllDisplays() {
  document.getElementById('chips-me').textContent = players[0].chips;
  document.getElementById('my-chips').textContent = players[0].chips;
  for (let i = 1; i <= 3; i++) {
    document.getElementById('chips-' + i).textContent = players[i].chips;
  }
  document.getElementById('pot-amount').textContent = potAmount;
  document.getElementById('btn-call').textContent = '跟注 ' + (currentBet > 0 ? currentBet : 0);
}

function updateRaiseAmount() {
  document.getElementById('raise-amount').textContent = document.getElementById('raise-slider').value;
}

// ============ 游戏结束 ============
function endGame() {
  clearInterval(turnTimer);
  disableButtons();
  currentState = GameState.RESULT;
  highlightCurrentPlayer(-1);

  // Reveal all AI cards
  for (let i = 1; i <= 3; i++) {
    const aiCardEls = document.querySelectorAll('#cards-' + i + ' .card');
    aiCardEls.forEach((card, j) => {
      const c = players[i].cards[j];
      card.textContent = c;
      card.classList.remove('hidden');
      card.classList.add((getCardSuit(c) === '♥' || getCardSuit(c) === '♦') ? 'red' : 'black');
    });
  }
  setTimeout(() => showResult(), 1000);
}

function showResult() {
  const activePlayers = players.filter(p => p.active);
  let resultTitle, resultText, resultChips;

  if (!players[0].active) {
    if (activePlayers.length <= 1) {
      resultTitle = '平局'; resultText = '所有人弃牌'; resultChips = 0;
    } else {
      resultTitle = '失败'; resultText = '你已弃牌'; resultChips = 0;
    }
  } else if (activePlayers.length === 1) {
    resultTitle = '胜利'; players[0].chips += potAmount;
    resultText = '所有人弃牌，你获胜！'; resultChips = '+' + potAmount;
  } else {
    // Compare with all active AIs
    let bestResult = -1; // -1=lose, 0=tie, 1=win
    let bestOpp = null;
    for (const p of activePlayers) {
      if (p.id === 'me') continue;
      const cmp = compareHands(players[0].cards, p.cards);
      if (cmp > bestResult) { bestResult = cmp; bestOpp = p; }
    }
    if (bestResult >= 0) {
      resultTitle = '胜利';
      players[0].chips += potAmount;
      resultChips = '+' + potAmount;
    } else {
      resultTitle = '失败';
      resultChips = '-' + (1000 - players[0].chips);
    }
    const myHand = HandName[getHandType(players[0].cards)];
    resultText = '你的牌型：' + myHand;
  }

  const titleEl = document.getElementById('result-title');
  titleEl.textContent = resultTitle;
  titleEl.className = 'result-title ' + (resultTitle === '胜利' ? 'win' : 'lose');
  document.getElementById('result-hand').textContent = resultText;
  const chipsEl = document.getElementById('result-chips');
  chipsEl.textContent = resultChips;
  chipsEl.className = 'result-chips ' + (resultChips > 0 ? 'win' : 'lose');
  document.getElementById('result-modal').style.display = 'flex';
  updateAllDisplays();
}

// ============ 计时器 ============
function startTurnTimer() {
  turnTimeLeft = 15;
  clearInterval(turnTimer);
  const timerFill = document.getElementById('timer-fill');
  timerFill.style.width = '100%';
  turnTimer = setInterval(() => {
    turnTimeLeft -= 0.5;
    timerFill.style.width = (turnTimeLeft / 15 * 100) + '%';
    if (turnTimeLeft <= 0) {
      clearInterval(turnTimer);
      showToast('超时自动弃牌');
      if (currentPlayerIdx === 0) doAction('FOLD');
    }
  }, 500);
}

// ============ 按钮控制 ============
function enableButtons() {
  ['btn-call', 'btn-check', 'btn-fold', 'btn-raise'].forEach(id => {
    const b = document.getElementById(id); if (b) b.disabled = false;
  });
}
function disableButtons() {
  ['btn-call', 'btn-check', 'btn-fold', 'btn-raise'].forEach(id => {
    const b = document.getElementById(id); if (b) b.disabled = true;
  });
}

// ============ UI 交互 ============
function exitGame() {
  if (confirm('确定要退出游戏吗？')) {
    clearInterval(turnTimer);
    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('menu-screen').style.display = 'flex';
    currentState = GameState.MENU;
  }
}
function backToMenu() {
  document.getElementById('result-modal').style.display = 'none';
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('menu-screen').style.display = 'flex';
  currentState = GameState.MENU;
}
function playAgain() {
  document.getElementById('result-modal').style.display = 'none';
  initGame();
}
function showRecord() { alert('战绩功能即将上线！'); }

function showToast(message) {
  console.log('[Toast]', message);
  const el = document.getElementById('toast');
  if (el) {
    el.textContent = message;
    el.style.display = 'block';
    el.style.opacity = '1';
    setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.style.display = 'none', 300); }, 2000);
  }
}
