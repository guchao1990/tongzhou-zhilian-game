<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>炸金花 - 同舟智联</title>
  <style>
    /* ============ 全局样式 ============ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --primary: #1B5E20;
      --primary-light: #2E7D32;
      --accent: #FFD700;
      --accent-light: #FFE082;
      --bg: #0D1B0F;
      --bg-table: #1A3D1C;
      --text: #FFFFFF;
      --text-gold: #FFE082;
      --danger: #F44336;
      --success: #4CAF50;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    /* ============ 加载页 ============ */
    #loading-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .loading-title {
      font-size: 32px;
      font-weight: bold;
      color: var(--accent);
      margin-bottom: 30px;
      text-shadow: 0 2px 10px rgba(255, 215, 0, 0.3);
    }

    .loading-bar {
      width: 200px;
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
    }

    .loading-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary-light), var(--accent));
      width: 0%;
      transition: width 0.3s;
    }

    .loading-tip {
      margin-top: 15px;
      font-size: 14px;
      color: rgba(255,255,255,0.5);
    }

    /* ============ 主菜单 ============ */
    #menu-screen {
      display: none;
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, var(--bg) 0%, #0a2a0f 100%);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .menu-logo {
      font-size: 42px;
      font-weight: bold;
      color: var(--accent);
      text-shadow: 0 0 20px rgba(255,215,0,0.5);
      margin-bottom: 10px;
    }

    .menu-subtitle {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 60px;
    }

    .menu-btn {
      width: 280px;
      padding: 16px;
      margin: 10px 0;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .menu-btn:active {
      transform: scale(0.96);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      color: white;
      box-shadow: 0 4px 15px rgba(46, 125, 50, 0.4);
    }

    .btn-accent {
      background: linear-gradient(135deg, #FF8F00, #FF6F00);
      color: white;
      box-shadow: 0 4px 15px rgba(255, 111, 0, 0.4);
    }

    .btn-outline {
      background: transparent;
      border: 2px solid rgba(255,255,255,0.3);
      color: white;
    }

    .menu-footer {
      position: absolute;
      bottom: 30px;
      font-size: 12px;
      color: rgba(255,255,255,0.3);
    }

    /* ============ 难度选择 ============ */
    #difficulty-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal-content {
      background: var(--bg-table);
      border-radius: 20px;
      padding: 30px;
      width: 300px;
      text-align: center;
    }

    .modal-title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 20px;
      color: var(--accent);
    }

    .diff-btn {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      background: rgba(255,255,255,0.1);
      color: white;
      transition: background 0.2s;
    }

    .diff-btn:active {
      background: rgba(255,255,255,0.2);
    }

    .diff-btn.easy { border-left: 3px solid #4CAF50; }
    .diff-btn.normal { border-left: 3px solid #FF9800; }
    .diff-btn.hard { border-left: 3px solid #F44336; }

    /* ============ 游戏桌 ============ */
    #game-screen {
      display: none;
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, var(--bg-table) 0%, var(--bg) 100%);
      flex-direction: column;
    }

    /* 顶部栏 */
    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 15px;
      background: rgba(0,0,0,0.3);
    }

    .game-info {
      display: flex;
      gap: 15px;
      font-size: 14px;
    }

    .info-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .info-icon {
      font-size: 16px;
    }

    .btn-back {
      background: rgba(255,255,255,0.1);
      border: none;
      color: white;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }

    /* 牌桌 */
    .game-table {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 20px;
    }

    .table-center {
      width: 200px;
      height: 120px;
      background: radial-gradient(ellipse, #2E5A2E 0%, #1B3D1B 100%);
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 8px solid #3D7A3D;
      box-shadow: 0 0 30px rgba(0,0,0,0.5), inset 0 0 30px rgba(0,0,0,0.3);
    }

    .pot-label {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
    }

    .pot-amount {
      font-size: 28px;
      font-weight: bold;
      color: var(--accent);
      text-shadow: 0 0 10px rgba(255,215,0,0.5);
    }

    .round-info {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      margin-top: 5px;
    }

    /* 玩家区域 */
    .player-area {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .player-area.top-left { top: 20px; left: 20px; }
    .player-area.top-right { top: 20px; right: 20px; }
    .player-area.bottom-left { bottom: 180px; left: 20px; }
    .player-area.bottom-right { bottom: 180px; right: 20px; }
    .player-area.bottom { bottom: 20px; left: 50%; transform: translateX(-50%); }

    .player-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      border: 3px solid rgba(255,255,255,0.2);
      position: relative;
    }

    .player-avatar.dealer::after {
      content: '庄';
      position: absolute;
      top: -8px;
      right: -8px;
      width: 20px;
      height: 20px;
      background: var(--accent);
      color: #000;
      border-radius: 50%;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    .player-avatar.online::before {
      content: '';
      position: absolute;
      bottom: 0;
      right: 0;
      width: 12px;
      height: 12px;
      background: var(--success);
      border-radius: 50%;
      border: 2px solid var(--bg);
    }

    .player-name {
      font-size: 12px;
      color: white;
      max-width: 70px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .player-chips {
      font-size: 11px;
      color: var(--accent);
    }

    /* 手牌 */
    .cards-row {
      display: flex;
      gap: 5px;
    }

    .card {
      width: 45px;
      height: 65px;
      background: white;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: bold;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      position: relative;
      transition: transform 0.3s;
    }

    .card.red { color: #E53935; }
    .card.black { color: #212121; }
    .card.hidden {
      background: linear-gradient(135deg, #1B5E20, #2E7D32);
      color: transparent;
    }
    .card.hidden::after {
      content: '?';
      color: rgba(255,255,255,0.3);
      font-size: 24px;
    }

    .card:active {
      transform: translateY(-5px);
    }

    /* 当前出牌玩家高亮 */
    .player-area.current-turn .player-avatar {
      box-shadow: 0 0 0 3px var(--accent), 0 0 20px rgba(255,215,0,0.5);
    }

    /* 操作区 */
    .action-area {
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      padding: 15px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .action-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 10px;
    }

    .action-btn {
      flex: 1;
      max-width: 120px;
      padding: 12px 8px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }

    .action-btn:active {
      transform: scale(0.95);
    }

    .action-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-fold {
      background: #616161;
      color: white;
    }
    .btn-call {
      background: #1565C0;
      color: white;
    }
    .btn-raise {
      background: #F57C00;
      color: white;
    }
    .btn-look {
      background: #388E3C;
      color: white;
    }

    .raise-control {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
    }

    .raise-slider {
      flex: 1;
      max-width: 200px;
      -webkit-appearance: none;
      height: 6px;
      border-radius: 3px;
      background: rgba(255,255,255,0.2);
    }

    .raise-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }

    .raise-amount {
      min-width: 60px;
      text-align: center;
      font-size: 14px;
      color: var(--accent);
    }

    /* 计时器 */
    .timer-bar {
      height: 4px;
      background: rgba(255,255,255,0.1);
      width: 100%;
    }

    .timer-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--success), var(--accent));
      width: 100%;
      transition: width 0.5s linear;
    }

    /* ============ 结果弹窗 ============ */
    #result-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      align-items: center;
      justify-content: center;
      z-index: 200;
    }

    .result-content {
      background: linear-gradient(180deg, var(--bg-table), var(--bg));
      border-radius: 20px;
      padding: 30px;
      width: 320px;
      text-align: center;
      border: 2px solid var(--accent);
    }

    .result-title {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .result-title.win { color: var(--accent); }
    .result-title.lose { color: #F44336; }

    .result-hand {
      font-size: 18px;
      color: white;
      margin-bottom: 20px;
    }

    .result-chips {
      font-size: 36px;
      font-weight: bold;
      margin-bottom: 25px;
    }

    .result-chips.win { color: var(--success); }
    .result-chips.lose { color: var(--danger); }

    .result-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      color: white;
      margin: 5px 0;
    }

    /* ============ 动画 ============ */
    @keyframes cardDeal {
      from {
        transform: translateY(-200px) rotate(180deg) scale(0.5);
        opacity: 0;
      }
      to {
        transform: translateY(0) rotate(0) scale(1);
        opacity: 1;
      }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    .card-dealing {
      animation: cardDeal 0.4s ease-out;
    }

    .pulse {
      animation: pulse 1s infinite;
    }

    .fade-in {
      animation: fadeIn 0.3s ease-out;
    }
  </style>
</head>

<script>
/* ============================================
 * 炸金花游戏 - 清晰状态机版
 * ============================================ */
const GS = { MENU:'menu', LOADING:'loading', PLAYING:'playing', RESULT:'result' };
const HR = { SINGLE:1, PAIR:2, STRAIGHT:3, FLUSH:4, BOMB:5 };
const HN = {1:'单张',2:'对子',3:'顺子',4:'金花',5:'炸弹'};
const ANTE = 50;

let state = GS.MENU;
let players = [];
let myCards = [];
let pot = 0, curBet = 0, blindBet = 0;
let turnIdx = 0;   // 0=human, 1-3=AI
let seen = {};     // id -> bool
let busy = false;  // 防止重复触发
let timer = null;

function val(c) { const m={'A':14,'K':13,'Q':12,'J':11,'10':10,'9':9}; return m[c.slice(1)]||+c.slice(1); }
function suit(c) { return c[0]; }
function red(c) { const s=suit(c); return s==='♥'||s==='♦'; }
function handType(cards) {
  if(!cards||cards.length!==3) return HR.SINGLE;
  const v=cards.map(val).sort((a,b)=>a-b), s=cards.map(suit);
  const flush=s.every(x=>x===s[0]);
  const straight=v[2]-v[1]===1&&v[1]-v[0]===1;
  const bomb=v[0]===v[1]&&v[1]===v[2];
  const pair=v[0]===v[1]||v[1]===v[2];
  if(bomb) return HR.BOMB;
  if(flush&&straight) return HR.STRAIGHT;
  if(flush) return HR.FLUSH;
  if(straight) return HR.STRAIGHT;
  if(pair) return HR.PAIR;
  return HR.SINGLE;
}
function cmp(a,b) {
  const ta=handType(a),tb=handType(b);
  if(ta!==tb) return ta>tb?1:-1;
  const va=a.map(val).sort((x,y)=>x-y), vb=b.map(val).sort((x,y)=>x-y);
  if(ta===HR.PAIR){const pa=va[1],pb=vb[1];if(pa!==pb) return pa>pb?1:-1;const sa=va[0]===va[1]?va[2]:va[0],sb=vb[0]===vb[1]?vb[2]:vb[0];return sa>sb?1:(sa<sb?-1:0);}
  for(let i=2;i>=0;i--) if(va[i]!==vb[i]) return va[i]>vb[i]?1:-1;
  return 0;
}

document.addEventListener('DOMContentLoaded', () => { simLoad(); });

function simLoad() {
  const fill=document.getElementById('loading-fill'), tip=document.getElementById('loading-tip');
  const tips=['正在加载扑克牌资源...','正在初始化游戏引擎...','正在连接服务器...','准备就绪!'];
  let p=0;
  const iv=setInterval(()=>{
    p+=Math.random()*25;
    if(p>=100){p=100;clearInterval(iv);setTimeout(()=>{
      document.getElementById('loading-screen').style.display='none';
      document.getElementById('menu-screen').style.display='flex';
      state=GS.MENU;},500);}
    fill.style.width=p+'%';tip.textContent=tips[Math.floor(p/25)]||tips[3];
  },300);
}

function startGame(m){if(m==='ai')document.getElementById('difficulty-modal').style.display='flex';else alert('在线模式即将上线！');}
function confirmDifficulty(){document.getElementById('difficulty-modal').style.display='none';startNewGame();}
function hideDifficulty(){document.getElementById('difficulty-modal').style.display='none';}

function startNewGame() {
  console.log('[Game] startNewGame');
  if(busy) return;
  busy = true;
  state = GS.PLAYING;
  document.getElementById('menu-screen').style.display='none';
  document.getElementById('game-screen').style.display='flex';
  document.getElementById('result-modal').style.display='none';

  pot = ANTE * 4;
  curBet = ANTE;
  blindBet = ANTE * 2;
  turnIdx = 0;

  players=[
    {id:'me',  name:'我',   chips:1000-ANTE, active:true, cards:[]},
    {id:'ai1',name:'小智', chips:1000-ANTE, active:true, cards:[]},
    {id:'ai2',name:'小红', chips:1000-ANTE, active:true, cards:[]},
    {id:'ai3',name:'小刚', chips:1000-ANTE, active:true, cards:[]},
  ];
  seen={'me':false,ai1:false,ai2:false,ai3:false};

  // Reset UI names and classes
  const names=['我','小智','小红','小刚'];
  for(let i=0;i<4;i++){
    const suf=i===0?'-me':'-'+(i);
    document.getElementById('name'+suf).textContent=names[i];
    document.getElementById('chips'+suf).textContent=players[i].chips;
    const pel=document.getElementById('player'+suf);
    pel.classList.remove('player-folded','player-lost','player-seen','current-turn');
  }

  // Reset cards
  document.querySelectorAll('.card').forEach(c=>{c.textContent='?';c.className='card hidden';});
  document.getElementById('my-chips').textContent=players[0].chips;
  document.getElementById('pot-amount').textContent=pot;
  document.getElementById('btn-call').textContent='跟注 '+ANTE;
  document.getElementById('btn-look').textContent='看牌 '+blindBet;
  document.getElementById('btn-look').disabled=false;
  document.getElementById('raise-control').style.display='none';

  dealCards();
  highlightTurn();
  busy = false;
}

function dealCards() {
  console.log('[Game] dealCards');
  const suits=['♥','♠','♦','♣'], points=['A','K','Q','J','10','9'];
  for(let p=0;p<4;p++){
    players[p].cards=[];
    for(let i=0;i<3;i++) players[p].cards.push(suits[Math.floor(Math.random()*4)]+points[Math.floor(Math.random()*6)]);
  }
  myCards=players[0].cards;
  const all=document.querySelectorAll('.card');
  all.forEach((c,i)=>{c.classList.add('card-dealing');c.style.animationDelay=(i*0.06)+'s';});
  setTimeout(()=>{
    const myEl=document.querySelectorAll('#cards-me .card');
    myEl.forEach((c,i)=>{const cr=myCards[i];c.textContent=cr;c.classList.remove('hidden');c.classList.add(red(cr)?'red':'black');});
    for(let i=1;i<=3;i++) document.querySelectorAll('#cards-'+i+' .card').forEach(c=>{c.textContent='🎴';c.classList.remove('hidden','red','black');});
    enableBtns();
    startTimer();
  },600);
}

function doAction(type) {
  console.log('[Game] doAction', type, 'turnIdx=', turnIdx, 'busy=', busy);
  if(state!==GS.PLAYING||busy||turnIdx!==0) return;
  busy=true; clearTimer(); disableBtns();
  const me=players[0];
  const hasSeen=seen['me'];
  console.log('[Game] action:', type, 'seen=', hasSeen, 'chips=', me.chips);

  if(type==='fold'){
    me.active=false;
    document.getElementById('player-me').classList.add('player-folded');
    toast('已弃牌');
    setTimeout(()=>{busy=false;advanceTurn();},400);
  } else if(type==='look'){
    if(!hasSeen){
      me.chips-=blindBet; pot+=blindBet;
      seen['me']=true;
      document.getElementById('player-me').classList.add('player-seen');
      // Reveal my cards
      document.querySelectorAll('#cards-me .card').forEach((c,i)=>{c.textContent=myCards[i];c.classList.add(red(myCards[i])?'red':'black');});
      toast('看牌，暗注 '+blindBet);
    }
    setTimeout(()=>{busy=false;advanceTurn();},400);
  } else if(type==='call'){
    const cost=hasSeen?curBet:blindBet;
    me.chips-=cost; pot+=cost;
    if(!hasSeen){seen['me']=true;document.getElementById('player-me').classList.add('player-seen');}
    toast('跟注 '+cost);
    updateUI();
    setTimeout(()=>{busy=false;advanceTurn();},400);
  } else if(type==='raise'){
    const raiseAmt=+document.getElementById('raise-slider').value||100;
    const total=(hasSeen?curBet:blindBet)+raiseAmt;
    if(total>me.chips){toast('筹码不足！');busy=false;enableBtns();return;}
    me.chips-=total; pot+=total;
    curBet+=raiseAmt; blindBet=curBet*2;
    seen['me']=true;
    document.getElementById('player-me').classList.add('player-seen');
    toast('加注 '+(hasSeen?'':'(暗)')+total);
    updateUI();
    setTimeout(()=>{busy=false;advanceTurn();},400);
  }
}

function advanceTurn() {
  console.log('[Game] advanceTurn, turnIdx=', turnIdx);
  clearTimer();
  const active=players.filter(p=>p.active);
  console.log('[Game] active players:', active.length, active.map(p=>p.id));

  if(active.length<=1){endGame();return;}
  if(active.length===2){endGame();return;}

  // Find next active player clockwise
  let next=-1;
  for(let i=1;i<=3;i++){
    const idx=(turnIdx+i)%4;
    if(players[idx]&&players[idx].active){next=idx;break;}
  }
  console.log('[Game] next player:', next);
  if(next===-1){endGame();return;}

  turnIdx=next;
  highlightTurn();

  if(turnIdx===0){
    console.log('[Game] Back to human, enabling buttons');
    enableBtns(); startTimer();
  } else {
    console.log('[Game] AI turn:', players[turnIdx].name);
    disableBtns(); startTimer();
    setTimeout(()=>doAIAction(turnIdx), 500);
  }
}

function doAIAction(idx) {
  console.log('[Game] doAIAction', idx, 'state=', state);
  if(state!==GS.PLAYING) return;
  clearTimer();
  const ai=players[idx];
  if(!ai||!ai.active){advanceTurn();return;}

  const hasSeen=seen[ai.id];
  const bet=hasSeen?curBet:blindBet;
  const r=Math.random(), cost=bet;
  console.log('[Game] AI', ai.name, 'hasSeen=', hasSeen, 'bet=', bet, 'chips=', ai.chips, 'r=', r.toFixed(2));

  let action;
  if(r<0.15) action='fold';
  else if(r<0.4) action='look';
  else if(r<0.78) action='call';
  else action='raise';

  console.log('[Game] AI action:', action, 'cost=', cost);

  if(action==='fold'){
    ai.active=false;
    document.getElementById('player-'+idx).classList.add('player-folded');
    toast(ai.name+' 弃牌');
    updateUI();
    setTimeout(()=>advanceTurn(), 700);
  } else {
    const actualCost=Math.min(cost+(action==='raise'?50+Math.floor(Math.random()*100):0), ai.chips);
    if(actualCost<=0||actualCost>ai.chips){toast(ai.name+' 弃牌');ai.active=false;document.getElementById('player-'+idx).classList.add('player-folded');updateUI();setTimeout(()=>advanceTurn(),700);return;}
    ai.chips-=actualCost; pot+=actualCost;
    seen[ai.id]=true;
    document.getElementById('player-'+idx).classList.add('player-seen');

    if(action==='look'){
      toast(ai.name+' 看牌，暗注 '+actualCost);
      // Reveal AI cards
      document.querySelectorAll('#cards-'+idx+' .card').forEach((c,j)=>{const cr=ai.cards[j];c.textContent=cr;c.classList.remove('hidden');c.classList.add(red(cr)?'red':'black');});
    } else if(action==='call'){
      toast(ai.name+' 跟注 '+actualCost);
    } else if(action==='raise'){
      curBet+=actualCost-bet; blindBet=curBet*2;
      toast(ai.name+' 加注 '+actualCost);
    }
    updateUI();
    setTimeout(()=>advanceTurn(), 800);
  }
}

function highlightTurn() {
  document.querySelectorAll('.player-area').forEach(el=>el.classList.remove('current-turn'));
  const id=turnIdx===0?'player-me':'player-'+turnIdx;
  const el=document.getElementById(id);
  if(el) el.classList.add('current-turn');
}

function updateUI() {
  document.getElementById('chips-me').textContent=players[0].chips;
  document.getElementById('my-chips').textContent=players[0].chips;
  for(let i=1;i<=3;i++) document.getElementById('chips-'+i).textContent=players[i].chips;
  document.getElementById('pot-amount').textContent=pot;
  updateBtnTexts();
}

function updateBtnTexts() {
  const hasSeen=seen['me'];
  const callCost=hasSeen?curBet:blindBet;
  document.getElementById('btn-call').textContent='跟注 '+callCost;
  document.getElementById('btn-look').textContent='看牌 '+blindBet;
  document.getElementById('btn-look').disabled=hasSeen;
  const slider=document.getElementById('raise-slider');
  const amountEl=document.getElementById('raise-amount');
  if(slider&&amountEl){
    const maxR=Math.min(players[0].chips-callCost, 500);
    slider.max=Math.max(maxR,50);
    slider.value=Math.min(Math.floor(players[0].chips/4),200);
    amountEl.textContent=slider.value;
  }
}

function startTimer() {
  clearTimer();
  let left=20;
  const fill=document.getElementById('timer-fill');
  if(fill) fill.style.width='100%';
  timer=setInterval(()=>{
    left-=0.5;
    const fill=document.getElementById('timer-fill');
    if(fill) fill.style.width=(left/20*100)+'%';
    if(left<=0){clearTimer();
      if(turnIdx===0&&players[0].active){toast('超时自动弃牌');doAction('fold');}
    }
  },500);
}

function clearTimer(){if(timer){clearInterval(timer);timer=null;}}

function endGame() {
  console.log('[Game] endGame');
  clearTimer(); disableBtns(); state=GS.RESULT;
  highlightTurn();
  for(let i=1;i<=3;i++){
    if(!players[i].active) continue;
    document.querySelectorAll('#cards-'+i+' .card').forEach((c,j)=>{
      const cr=players[i].cards[j];c.textContent=cr;c.classList.remove('hidden');c.classList.add(red(cr)?'red':'black');
    });
  }
  setTimeout(()=>showResult(),1200);
}

function showResult() {
  const active=players.filter(p=>p.active);
  let title,text,chipsStr;
  const me=players[0];

  if(!me.active){
    if(active.length===1&&active[0].id==='me'){title='胜利';me.chips+=pot;text='获胜！';chipsStr='+'+pot;}
    else{title='失败';text='你已弃牌';chipsStr='0';}
  } else if(active.length===1){
    title='胜利';me.chips+=pot;text='所有对手弃牌！';chipsStr='+'+pot;
  } else {
    let best=active[0];
    for(const p of active) if(cmp(p.cards,best.cards)>0) best=p;
    const myCmp=cmp(me.cards,best.cards);
    if(myCmp>=0){title='胜利';me.chips+=pot;chipsStr='+'+pot;}
    else{title='失败';chipsStr='-'+(1000-ANTE-me.chips);}
    text='你的牌型：'+HN[handType(me.cards)];
  }
  const t=document.getElementById('result-title');
  t.textContent=title;t.className='result-title '+(title==='胜利'?'win':'lose');
  document.getElementById('result-hand').textContent=text;
  const c=document.getElementById('result-chips');
  c.textContent=chipsStr;c.className='result-chips '+(chipsStr>0?'win':'lose');
  document.getElementById('result-modal').style.display='flex';
  updateUI();
}

function enableBtns(){
  if(state!==GS.PLAYING||turnIdx!==0||!players[0].active) return;
  ['btn-fold','btn-look','btn-call','btn-raise'].forEach(id=>{const b=document.getElementById(id);if(b)b.disabled=false;});
  updateBtnTexts();
}
function disableBtns(){['btn-fold','btn-look','btn-call','btn-raise'].forEach(id=>{const b=document.getElementById(id);if(b)b.disabled=true;});}

function exitGame(){if(confirm('确定要退出游戏吗？')){clearTimer();document.getElementById('game-screen').style.display='none';document.getElementById('menu-screen').style.display='flex';state=GS.MENU;busy=false;}}
function backToMenu(){document.getElementById('result-modal').style.display='none';document.getElementById('game-screen').style.display='none';document.getElementById('menu-screen').style.display='flex';state=GS.MENU;busy=false;}
function playAgain(){document.getElementById('result-modal').style.display='none';startNewGame();}
function showRecord(){alert('战绩功能即将上线！');}
function toast(msg){
  console.log('[Toast]',msg);
  const el=document.getElementById('toast');
  if(el){el.textContent=msg;el.style.display='block';el.style.opacity='1';
    setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.style.display='none',300);},2500);}
}
</script>
