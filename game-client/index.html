<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>炸金花 - 同舟智联</title>
  <style>
    /* ============ 全局样式 ============ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --primary: #1B5E20;
      --primary-light: #2E7D32;
      --accent: #FFD700;
      --accent-light: #FFE082;
      --bg: #0D1B0F;
      --bg-table: #1A3D1C;
      --text: #FFFFFF;
      --text-gold: #FFE082;
      --danger: #F44336;
      --success: #4CAF50;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    /* ============ 加载页 ============ */
    #loading-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .loading-title {
      font-size: 32px;
      font-weight: bold;
      color: var(--accent);
      margin-bottom: 30px;
      text-shadow: 0 2px 10px rgba(255, 215, 0, 0.3);
    }

    .loading-bar {
      width: 200px;
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
    }

    .loading-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary-light), var(--accent));
      width: 0%;
      transition: width 0.3s;
    }

    .loading-tip {
      margin-top: 15px;
      font-size: 14px;
      color: rgba(255,255,255,0.5);
    }

    /* ============ 主菜单 ============ */
    #menu-screen {
      display: none;
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, var(--bg) 0%, #0a2a0f 100%);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .menu-logo {
      font-size: 42px;
      font-weight: bold;
      color: var(--accent);
      text-shadow: 0 0 20px rgba(255,215,0,0.5);
      margin-bottom: 10px;
    }

    .menu-subtitle {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 60px;
    }

    .menu-btn {
      width: 280px;
      padding: 16px;
      margin: 10px 0;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .menu-btn:active {
      transform: scale(0.96);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      color: white;
      box-shadow: 0 4px 15px rgba(46, 125, 50, 0.4);
    }

    .btn-accent {
      background: linear-gradient(135deg, #FF8F00, #FF6F00);
      color: white;
      box-shadow: 0 4px 15px rgba(255, 111, 0, 0.4);
    }

    .btn-outline {
      background: transparent;
      border: 2px solid rgba(255,255,255,0.3);
      color: white;
    }

    .menu-footer {
      position: absolute;
      bottom: 30px;
      font-size: 12px;
      color: rgba(255,255,255,0.3);
    }

    /* ============ 难度选择 ============ */
    #difficulty-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal-content {
      background: var(--bg-table);
      border-radius: 20px;
      padding: 30px;
      width: 300px;
      text-align: center;
    }

    .modal-title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 20px;
      color: var(--accent);
    }

    .diff-btn {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      background: rgba(255,255,255,0.1);
      color: white;
      transition: background 0.2s;
    }

    .diff-btn:active {
      background: rgba(255,255,255,0.2);
    }

    .diff-btn.easy { border-left: 3px solid #4CAF50; }
    .diff-btn.normal { border-left: 3px solid #FF9800; }
    .diff-btn.hard { border-left: 3px solid #F44336; }

    /* ============ 游戏桌 ============ */
    #game-screen {
      display: none;
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, var(--bg-table) 0%, var(--bg) 100%);
      flex-direction: column;
    }

    /* 顶部栏 */
    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 15px;
      background: rgba(0,0,0,0.3);
    }

    .game-info {
      display: flex;
      gap: 15px;
      font-size: 14px;
    }

    .info-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .info-icon {
      font-size: 16px;
    }

    .btn-back {
      background: rgba(255,255,255,0.1);
      border: none;
      color: white;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }

    /* 牌桌 */
    .game-table {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 20px;
    }

    .table-center {
      width: 200px;
      height: 120px;
      background: radial-gradient(ellipse, #2E5A2E 0%, #1B3D1B 100%);
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 8px solid #3D7A3D;
      box-shadow: 0 0 30px rgba(0,0,0,0.5), inset 0 0 30px rgba(0,0,0,0.3);
    }

    .pot-label {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
    }

    .pot-amount {
      font-size: 28px;
      font-weight: bold;
      color: var(--accent);
      text-shadow: 0 0 10px rgba(255,215,0,0.5);
    }

    .round-info {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      margin-top: 5px;
    }

    /* 玩家区域 */
    .player-area {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .player-area.top-left { top: 20px; left: 20px; }
    .player-area.top-right { top: 20px; right: 20px; }
    .player-area.bottom-left { bottom: 180px; left: 20px; }
    .player-area.bottom-right { bottom: 180px; right: 20px; }
    .player-area.bottom { bottom: 20px; left: 50%; transform: translateX(-50%); }

    .player-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      border: 3px solid rgba(255,255,255,0.2);
      position: relative;
    }

    .player-avatar.dealer::after {
      content: '庄';
      position: absolute;
      top: -8px;
      right: -8px;
      width: 20px;
      height: 20px;
      background: var(--accent);
      color: #000;
      border-radius: 50%;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    .player-avatar.online::before {
      content: '';
      position: absolute;
      bottom: 0;
      right: 0;
      width: 12px;
      height: 12px;
      background: var(--success);
      border-radius: 50%;
      border: 2px solid var(--bg);
    }

    .player-name {
      font-size: 12px;
      color: white;
      max-width: 70px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .player-chips {
      font-size: 11px;
      color: var(--accent);
    }

    /* 手牌 */
    .cards-row {
      display: flex;
      gap: 5px;
    }

    .card {
      width: 45px;
      height: 65px;
      background: white;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: bold;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      position: relative;
      transition: transform 0.3s;
    }

    .card.red { color: #E53935; }
    .card.black { color: #212121; }
    .card.hidden {
      background: linear-gradient(135deg, #1B5E20, #2E7D32);
      color: transparent;
    }
    .card.hidden::after {
      content: '?';
      color: rgba(255,255,255,0.3);
      font-size: 24px;
    }

    .card:active {
      transform: translateY(-5px);
    }

    /* 当前出牌玩家高亮 */
    .player-area.current-turn .player-avatar {
      box-shadow: 0 0 0 3px var(--accent), 0 0 20px rgba(255,215,0,0.5);
    }

    /* 操作区 */
    .action-area {
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      padding: 15px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .action-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 10px;
    }

    .action-btn {
      flex: 1;
      max-width: 120px;
      padding: 12px 8px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }

    .action-btn:active {
      transform: scale(0.95);
    }

    .action-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-fold {
      background: #616161;
      color: white;
    }
    .btn-call {
      background: #1565C0;
      color: white;
    }
    .btn-raise {
      background: #F57C00;
      color: white;
    }
    .btn-check {
      background: #388E3C;
      color: white;
    }

    .raise-control {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
    }

    .raise-slider {
      flex: 1;
      max-width: 200px;
      -webkit-appearance: none;
      height: 6px;
      border-radius: 3px;
      background: rgba(255,255,255,0.2);
    }

    .raise-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }

    .raise-amount {
      min-width: 60px;
      text-align: center;
      font-size: 14px;
      color: var(--accent);
    }

    /* 计时器 */
    .timer-bar {
      height: 4px;
      background: rgba(255,255,255,0.1);
      width: 100%;
    }

    .timer-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--success), var(--accent));
      width: 100%;
      transition: width 0.5s linear;
    }

    /* ============ 结果弹窗 ============ */
    #result-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      align-items: center;
      justify-content: center;
      z-index: 200;
    }

    .result-content {
      background: linear-gradient(180deg, var(--bg-table), var(--bg));
      border-radius: 20px;
      padding: 30px;
      width: 320px;
      text-align: center;
      border: 2px solid var(--accent);
    }

    .result-title {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .result-title.win { color: var(--accent); }
    .result-title.lose { color: #F44336; }

    .result-hand {
      font-size: 18px;
      color: white;
      margin-bottom: 20px;
    }

    .result-chips {
      font-size: 36px;
      font-weight: bold;
      margin-bottom: 25px;
    }

    .result-chips.win { color: var(--success); }
    .result-chips.lose { color: var(--danger); }

    .result-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      color: white;
      margin: 5px 0;
    }

    /* ============ 动画 ============ */
    @keyframes cardDeal {
      from {
        transform: translateY(-200px) rotate(180deg) scale(0.5);
        opacity: 0;
      }
      to {
        transform: translateY(0) rotate(0) scale(1);
        opacity: 1;
      }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    .card-dealing {
      animation: cardDeal 0.4s ease-out;
    }

    .pulse {
      animation: pulse 1s infinite;
    }

    .fade-in {
      animation: fadeIn 0.3s ease-out;
    }
  </style>
</head>
<body>

<!-- 加载页 -->
<div id="loading-screen">
  <div class="loading-title">🎴 炸金花</div>
  <div class="loading-bar">
    <div class="loading-bar-fill" id="loading-fill"></div>
  </div>
  <div class="loading-tip" id="loading-tip">正在加载资源...</div>
</div>

<!-- 主菜单 -->
<div id="menu-screen">

<!-- 游戏桌 -->
<div id="game-screen">
  <!-- 顶部栏 -->

    <div class="game-info">

  <!-- 牌桌 -->
  <div class="game-table">
    <!-- 底池 -->
    <div class="table-center">
      <div class="pot-label">底池</div>

    <!-- 玩家1（左上） -->
    <div class="player-area top-left" id="player-0">
      <div class="player-avatar" id="avatar-0">🤖</div>

      <div class="player-chips" id="chips-0">1000</div>

        <div class="card hidden">?</div>

    <!-- 玩家2（右上） -->
    <div class="player-area top-right" id="player-1">
      <div class="player-avatar" id="avatar-1">🤖</div>

    <!-- 玩家3（左下） -->

<script>
/* ============================================
 * 炸金花游戏 - 前端逻辑（完整版）
 * 前端工程师：同舟智联前端工程师
 * ============================================ */

// 游戏状态
const GameState = {
  MENU: 'menu',
  LOADING: 'loading',
  PLAYING: 'playing',
  RESULT: 'result'
};

// 牌型定义
const HandRank = {
  SINGLE: 1,      // 单张
  PAIR: 2,        // 对子
  STRAIGHT: 3,   // 顺子
  FLUSH: 4,       // 金花
  BOMB: 5         // 炸弹
};

const HandName = {
  1: '单张',
  2: '对子',
  3: '顺子',
  4: '金花',
  5: '炸弹'
};

// 全局变量
let currentState = GameState.LOADING;
let currentDifficulty = 'normal';
let gameRoomId = null;
let myPlayerId = null;
let turnTimer = null;
let turnTimeLeft = 15;

// 玩家数据
let players = [];
let myCards = [];
let currentBet = 0;   // 当前下注
let potAmount = 0;     // 底池
let aiActionCount = 0; // AI操作计数

// 初始化
document.addEventListener('DOMContentLoaded', () => {
  simulateLoading();
});

// ============ 牌型判断 ============
function getCardValue(card) {
  const point = card.substring(1);
  const map = { 'A': 14, 'K': 13, 'Q': 12, 'J': 11, '10': 10, '9': 9 };
  return map[point] || parseInt(point);
}

function getCardSuit(card) {
  return card[0];
}

function getHandType(cards) {
  if (!cards || cards.length !== 3) return HandRank.SINGLE;
  
  const values = cards.map(c => getCardValue(c)).sort((a, b) => a - b);
  const suits = cards.map(c => getCardSuit(c));
  
  const isFlush = suits[0] === suits[1] && suits[1] === suits[2];
  const isStraight = (values[2] - values[1] === 1) && (values[1] - values[0] === 1);
  
  // 是否三条（炸弹：三张相同点数）
  const isBomb = (values[0] === values[1]) && (values[1] === values[2]);
  
  // 是否对子
  const isPair = (values[0] === values[1]) || (values[1] === values[2]);
  
  if (isBomb) return HandRank.BOMB;
  if (isFlush && isStraight) return HandRank.STRAIGHT; // 同花顺也算顺子
  if (isFlush) return HandRank.FLUSH;
  if (isStraight) return HandRank.STRAIGHT;
  if (isPair) return HandRank.PAIR;
  return HandRank.SINGLE;
}

// 比较两手牌大小，返回 1=玩家赢，-1=对手赢，0=平
function compareHands(myCards, oppCards) {
  const myType = getHandType(myCards);
  const oppType = getHandType(oppCards);
  
  if (myType !== oppType) return myType > oppType ? 1 : -1;
  
  // 同牌型比点数
  const myVals = myCards.map(c => getCardValue(c)).sort((a, b) => a - b);
  const oppVals = oppCards.map(c => getCardValue(c)).sort((a, b) => a - b);
  
  // 对子特殊比较（比较对子+散牌）
  if (myType === HandRank.PAIR) {
    const myPair = myVals[1];
    const oppPair = oppVals[1];
    if (myPair !== oppPair) return myPair > oppPair ? 1 : -1;
    const mySingle = myVals[0] === myVals[1] ? myVals[2] : myVals[0];
    const oppSingle = oppVals[0] === oppVals[1] ? oppVals[2] : oppVals[0];
    return mySingle > oppSingle ? 1 : (mySingle < oppSingle ? -1 : 0);
  }
  
  // 其他牌型：直接比最大张
  for (let i = 2; i >= 0; i--) {
    if (myVals[i] !== oppVals[i]) return myVals[i] > oppVals[i] ? 1 : -1;
  }
  return 0;
}

// ============ 模拟加载 ============
function simulateLoading() {
  const loadingFill = document.getElementById('loading-fill');
  const loadingTip = document.getElementById('loading-tip');
  const tips = [
    '正在加载扑克牌资源...',
    '正在初始化游戏引擎...',
    '正在连接服务器...',
    '准备就绪!'
  ];
  let progress = 0;

  const interval = setInterval(() => {
    progress += Math.random() * 25;
    if (progress >= 100) {
      progress = 100;
      clearInterval(interval);
      setTimeout(() => {
        document.getElementById('loading-screen').style.display = 'none';
        document.getElementById('menu-screen').style.display = 'flex';
        currentState = GameState.MENU;
      }, 500);
    }
    loadingFill.style.width = progress + '%';
    loadingTip.textContent = tips[Math.floor(progress / 25)] || tips[3];
  }, 300);
}

// ============ 游戏流程 ============
function startGame(mode) {
  if (mode === 'ai') {
    document.getElementById('difficulty-modal').style.display = 'flex';
  } else {
    alert('在线模式即将上线，请先体验人机对战！');
  }
}

function confirmDifficulty(diff) {
  currentDifficulty = diff;
  document.getElementById('difficulty-modal').style.display = 'none';
  initGame();
}

function hideDifficulty() {
  document.getElementById('difficulty-modal').style.display = 'none';
}

function initGame() {
  document.getElementById('menu-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'flex';
  document.getElementById('result-modal').style.display = 'none';
  currentState = GameState.PLAYING;

  // 初始化玩家
  players = [
    { id: 'me', name: '我', chips: 1000, active: true, cards: [] },
    { id: 'ai_1', name: '小智', chips: 1000, active: true, cards: [] },
    { id: 'ai_2', name: '小红', chips: 1000, active: true, cards: [] },
    { id: 'ai_3', name: '小刚', chips: 1000, active: true, cards: [] },
  ];
  myCards = [];
  potAmount = 0;
  currentBet = 0;
  aiActionCount = 0;

  // 更新显示
  players.forEach((p, i) => {
    document.getElementById('name-' + i).textContent = p.name;
    document.getElementById('chips-' + i).textContent = p.chips;
    document.getElementById('avatar-' + i).textContent = i === 0 ? '😀' : '🤖';
    // 重置卡牌
    const cardEls = document.querySelectorAll('#cards-' + i + ' .card');
    cardEls.forEach(c => { c.textContent = '?'; c.className = 'card hidden'; });
  });
  document.getElementById('my-chips').textContent = '1000';
  document.getElementById('chips-me').textContent = '1000';
  document.getElementById('pot-amount').textContent = '0';
  document.getElementById('raise-control').style.display = 'none';
  
  // 初始化玩家数据
  initPlayersData();
  // 发牌
  dealCards();
  // 开始回合计时
  startTurnTimer();
}

function initPlayersData() {
  players.forEach((p, i) => {
    document.getElementById('name-' + i).textContent = p.name;
    document.getElementById('chips-' + i).textContent = p.chips;
    document.getElementById('chips-' + i).parentElement.classList.remove('player-folded', 'player-lost');
  });
}

// 发牌
function dealCards() {
  const suits = ['♥', '♠', '♦', '♣'];
  const points = ['A', 'K', 'Q', 'J', '10', '9'];
  
  players.forEach((p, idx) => {
    p.cards = [];
    for (let i = 0; i < 3; i++) {
      const suit = suits[Math.floor(Math.random() * suits.length)];
      const point = points[Math.floor(Math.random() * points.length)];
      p.cards.push(suit + point);
    }
  });
  myCards = players[0].cards;

  const cardEls = document.querySelectorAll('.card');
  cardEls.forEach((card, i) => {
    card.classList.add('card-dealing');
    card.style.animationDelay = (i * 0.1) + 's';
  });

  setTimeout(() => {
    // 显示我的牌
    const myCardEls = document.querySelectorAll('#cards-me .card');
    myCardEls.forEach((card, i) => {
      const c = myCards[i];
      card.textContent = c;
      card.classList.remove('hidden');
      card.classList.add(getCardSuit(c) === '♥' || getCardSuit(c) === '♦' ? 'red' : 'black');
    });
    
    // AI 暗牌
    for (let i = 1; i <= 3; i++) {
      const aiCardEls = document.querySelectorAll('#cards-' + i + ' .card');
      aiCardEls.forEach(card => {
        card.textContent = '🎴';
        card.classList.remove('hidden', 'red', 'black');
      });
    }
    
    enableButtons();
    showToast('请选择操作');
  }, 800);
}

// ============ 操作逻辑 ============
function doAction(action) {
  if (currentState !== GameState.PLAYING) return;
  
  const me = players[0];
  const betAmount = 50; // 跟注金额

  if (action === 'FOLD') {
    me.active = false;
    document.getElementById('player-me').classList.add('player-folded');
    showToast('已弃牌');
    disableButtons();
    setTimeout(() => checkGameEnd(), 500);
  } else if (action === 'CHECK') {
    showToast('已看牌');
    disableButtons();
    setTimeout(() => simulateAITurn(), 1000);
  } else if (action === 'CALL') {
    me.chips -= betAmount;
    potAmount += betAmount;
    updateChipsDisplay();
    showToast('跟注 ' + betAmount);
    disableButtons();
    setTimeout(() => simulateAITurn(), 1000);
  } else if (action === 'RAISE') {
    const raiseAmount = parseInt(document.getElementById('raise-amount').textContent);
    me.chips -= raiseAmount;
    potAmount += raiseAmount;
    currentBet += raiseAmount;
    updateChipsDisplay();
    showToast('加注 ' + raiseAmount);
    disableButtons();
    setTimeout(() => simulateAITurn(), 1000);
  }
}

function updateChipsDisplay() {
  const me = players[0];
  document.getElementById('chips-me').textContent = me.chips;
  document.getElementById('my-chips').textContent = me.chips;
  document.getElementById('pot-amount').textContent = potAmount;
  document.getElementById('btn-call').textContent = '跟注 ' + (currentBet > 0 ? currentBet : 0);
}

// AI 回合
function simulateAITurn() {
  aiActionCount++;
  
  // 活跃AI玩家
  const activeAIs = players.slice(1).filter(p => p.active);
  if (activeAIs.length === 0) {
    checkGameEnd();
    return;
  }

  const ai = activeAIs[Math.floor(Math.random() * activeAIs.length)];
  const aiIdx = players.indexOf(ai);
  
  // 高亮AI
  document.querySelectorAll('.player-area').forEach(el => el.classList.remove('current-turn'));
  document.getElementById('player-' + aiIdx).classList.add('current-turn');

  // AI决策（简化：随机）
  const rand = Math.random();
  let action;
  if (rand < 0.15) {
    action = 'FOLD';
    ai.active = false;
    document.getElementById('player-' + aiIdx).classList.add('player-folded');
  } else if (rand < 0.5) {
    action = 'CALL';
    ai.chips -= 50;
    potAmount += 50;
  } else {
    action = 'CHECK';
  }

  const actionName = { FOLD: '弃牌', CALL: '跟注', CHECK: '看牌' }[action];
  showToast(ai.name + ' ' + actionName);

  setTimeout(() => {
    document.getElementById('player-' + aiIdx).classList.remove('current-turn');
    updateChipsDisplay();
    checkGameEnd();
  }, 1000);
}

// 检查游戏是否结束
function checkGameEnd() {
  const activePlayers = players.filter(p => p.active);
  
  // 只有1人或所有人都弃牌=游戏结束
  if (activePlayers.length <= 1 || aiActionCount >= players.length * 3) {
    endGame();
    return;
  }
  
  // 继续计时
  startTurnTimer();
}

// 结束游戏
function endGame() {
  clearInterval(turnTimer);
  disableButtons();
  currentState = GameState.RESULT;
  
  const me = players[0];
  const activePlayers = players.filter(p => p.active);
  
  // 如果自己没弃牌，显示手牌
  if (me.active) {
    const myCardEls = document.querySelectorAll('#cards-me .card');
    myCardEls.forEach((card, i) => {
      const c = myCards[i];
      card.textContent = c;
      card.classList.remove('hidden');
      card.classList.add(getCardSuit(c) === '♥' || getCardSuit(c) === '♦' ? 'red' : 'black');
    });
  }
  
  // 亮出所有AI的牌
  for (let i = 1; i <= 3; i++) {
    const ai = players[i];
    if (ai.active || !ai.foldedShown) {
      const aiCardEls = document.querySelectorAll('#cards-' + i + ' .card');
      aiCardEls.forEach((card, j) => {
        card.textContent = ai.cards[j];
        card.classList.remove('hidden');
        card.classList.add(getCardSuit(ai.cards[j]) === '♥' || getCardSuit(ai.cards[j]) === '♦' ? 'red' : 'black');
      });
      ai.foldedShown = true;
    }
  }
  
  setTimeout(() => showResult(), 1000);
}

// 显示结果
function showResult() {
  const me = players[0];
  const activePlayers = players.filter(p => p.active);
  
  let resultTitle, resultText, resultChips;
  
  if (!me.active) {
    // 我弃牌了
    if (activePlayers.length === 0) {
      resultTitle = '平局';
      resultText = '所有人都弃牌';
      resultChips = 0;
    } else {
      resultTitle = '失败';
      resultText = '你已弃牌';
      resultChips = 0;
    }
  } else if (activePlayers.length === 1) {
    // 只有我一个人了
    resultTitle = '胜利';
    const winChips = potAmount;
    me.chips += potAmount;
    resultText = '所有人都弃牌，你获胜！';
    resultChips = '+' + winChips;
  } else {
    // 需要比牌
    let maxWin = -1;
    let winner = null;
    
    for (const p of activePlayers) {
      const cmp = compareHands(me.cards, p.cards);
      if (cmp >= 0) {
        // 我赢了或者平局（我赢）
        const myType = getHandType(me.cards);
        const oppType = getHandType(p.cards);
        let score = myType * 10000 + me.cards.reduce((s, c) => s + getCardValue(c), 0);
        if (score > maxWin) {
          maxWin = score;
          winner = p;
        }
      }
    }
    
    if (winner || (activePlayers.length === 1 && activePlayers[0].id === 'me')) {
      resultTitle = '胜利';
      const winChips = potAmount;
      me.chips += winChips;
      const myHandName = HandName[getHandType(me.cards)];
      resultText = '你的牌型：' + myHandName;
      resultChips = '+' + winChips;
    } else {
      resultTitle = '失败';
      const myHandName = HandName[getHandType(me.cards)];
      const oppHandName = winner ? HandName[getHandType(winner.cards)] : '';
      resultText = '你的牌型：' + myHandName;
      resultChips = '-' + (1000 - me.chips);
    }
  }
  
  document.getElementById('result-title').textContent = resultTitle;
  document.getElementById('result-title').className = 'result-title ' + (resultTitle === '胜利' ? 'win' : 'lose');
  document.getElementById('result-hand').textContent = resultText;
  document.getElementById('result-chips').textContent = resultChips;
  document.getElementById('result-chips').className = 'result-chips ' + (resultChips > 0 ? 'win' : 'lose');
  document.getElementById('result-modal').style.display = 'flex';
  
  updateChipsDisplay();
}

function updateRaiseAmount() {
  document.getElementById('raise-amount').textContent = document.getElementById('raise-slider').value;
}

function startTurnTimer() {
  turnTimeLeft = 15;
  clearInterval(turnTimer);
  const timerFill = document.getElementById('timer-fill');
  timerFill.style.width = '100%';

  turnTimer = setInterval(() => {
    turnTimeLeft -= 0.5;
    timerFill.style.width = (turnTimeLeft / 15 * 100) + '%';
    if (turnTimeLeft <= 0) {
      clearInterval(turnTimer);
      showToast('超时自动弃牌');
      doAction('FOLD');
    }
  }, 500);
}

function enableButtons() {
  const btns = ['btn-call', 'btn-check', 'btn-fold', 'btn-raise'];
  btns.forEach(id => {
    const btn = document.getElementById(id);
    if (btn) btn.disabled = false;
  });
}

function disableButtons() {
  const btns = ['btn-call', 'btn-check', 'btn-fold', 'btn-raise'];
  btns.forEach(id => {
    const btn = document.getElementById(id);
    if (btn) btn.disabled = true;
  });
}

function exitGame() {
  if (confirm('确定要退出游戏吗？')) {
    clearInterval(turnTimer);
    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('menu-screen').style.display = 'flex';
    currentState = GameState.MENU;
  }
}

function backToMenu() {
  document.getElementById('result-modal').style.display = 'none';
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('menu-screen').style.display = 'flex';
  currentState = GameState.MENU;
}

function playAgain() {
  document.getElementById('result-modal').style.display = 'none';
  initGame();
}

function showRecord() {
  alert('战绩功能即将上线！');
}

function showToast(message) {
  console.log('[Toast]', message);
  const toast = document.getElementById('toast');
  if (toast) {
    toast.textContent = message;
    toast.style.display = 'block';
    toast.style.opacity = 1;
    setTimeout(() => {
      toast.style.opacity = 0;
      setTimeout(() => toast.style.display = 'none', 300);
    }, 2000);
  }
}
</script>
